<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 - Server Error | GlobexSky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <style>
    .error-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
      padding: 40px 20px;
    }
    .error-code {
      font-size: 120px;
      font-weight: 800;
      color: #ef4444;
      font-family: 'Poppins', sans-serif;
      line-height: 1;
    }
    .error-message {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      margin: 16px 0 10px;
      font-family: 'Poppins', sans-serif;
    }
    .error-description {
      font-size: 16px;
      color: #64748b;
      margin-bottom: 30px;
      font-family: 'Inter', sans-serif;
    }
    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-actions a {
      display: inline-block;
      padding: 12px 30px;
      background: #ff6b35;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s;
    }
    .error-actions a:hover { opacity: 0.85; }
    .error-actions a.secondary {
      background: #0052cc;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <div class="error-code">500</div>
      <div class="error-message">Internal Server Error</div>
      <p class="error-description">Something went wrong on our end. We're working to fix it — please try again shortly.</p>
      <div class="error-actions">
        <a href="/">Go Home</a>
        <a href="/pages/support/index.html" class="secondary">Contact Support</a>
      </div>
    </div>
  </div>
</body>
</html>
