<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Order Has Shipped — #{{orderId}}</title>
</head>
<body style="margin:0;padding:0;background:#f4f6f9;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6f9;padding:32px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
          <tr>
            <td style="background:#0052CC;padding:32px;text-align:center;">
              <h1 style="margin:0;color:#ffffff;font-size:28px;font-weight:700;">{{platformName}}</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:40px 40px 24px;">
              <h2 style="margin:0 0 8px;color:#172B4D;font-size:22px;">📦 Your Order Has Shipped!</h2>
              <p style="margin:0 0 24px;color:#505F79;font-size:16px;">
                Great news, {{userName}}! Your order <strong>#{{orderId}}</strong> is on its way.
              </p>

              <table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #DFE1E6;border-radius:6px;margin-bottom:24px;">
                <tr style="background:#F4F5F7;">
                  <td colspan="2" style="padding:12px 16px;font-weight:700;color:#172B4D;font-size:14px;border-bottom:1px solid #DFE1E6;">Shipment Details</td>
                </tr>
                <tr>
                  <td style="padding:12px 16px;color:#505F79;font-size:14px;border-bottom:1px solid #DFE1E6;width:40%;">Tracking Number</td>
                  <td style="padding:12px 16px;color:#172B4D;font-size:14px;font-weight:600;border-bottom:1px solid #DFE1E6;">{{trackingNumber}}</td>
                </tr>
                <tr>
                  <td style="padding:12px 16px;color:#505F79;font-size:14px;border-bottom:1px solid #DFE1E6;">Carrier</td>
                  <td style="padding:12px 16px;color:#172B4D;font-size:14px;border-bottom:1px solid #DFE1E6;">{{carrier}}</td>
                </tr>
                <tr>
                  <td style="padding:12px 16px;color:#505F79;font-size:14px;border-bottom:1px solid #DFE1E6;">Ship Date</td>
                  <td style="padding:12px 16px;color:#172B4D;font-size:14px;border-bottom:1px solid #DFE1E6;">{{shipDate}}</td>
                </tr>
                <tr>
                  <td style="padding:12px 16px;color:#505F79;font-size:14px;">Estimated Arrival</td>
                  <td style="padding:12px 16px;color:#172B4D;font-size:14px;font-weight:600;">{{estimatedArrival}}</td>
                </tr>
              </table>

              <table cellpadding="0" cellspacing="0" style="margin:0 0 24px;">
                <tr>
                  <td style="background:#0052CC;border-radius:6px;">
                    <a href="{{trackingUrl}}" style="display:inline-block;padding:14px 32px;color:#ffffff;text-decoration:none;font-size:16px;font-weight:600;">Track Shipment</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="background:#f4f6f9;padding:24px 40px;border-top:1px solid #DFE1E6;">
              <p style="margin:0;color:#97A0AF;font-size:13px;text-align:center;">
                Need help? <a href="{{supportUrl}}" style="color:#0052CC;">Contact support</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
