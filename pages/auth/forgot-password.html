<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password | Globex Sky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <link rel="stylesheet" href="../../assets/css/main.css"/>
  <link rel="stylesheet" href="../../assets/css/animations.css"/>
  <link rel="stylesheet" href="../../assets/css/responsive.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#f4f6fa;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .auth-box{background:#fff;border-radius:20px;padding:48px 40px;max-width:460px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.1);margin:24px 16px}
    .auth-logo{display:flex;justify-content:center;margin-bottom:32px}
    .auth-box h2{font-family:'Poppins',sans-serif;font-size:1.6rem;font-weight:700;color:#0A0E27;margin-bottom:8px;text-align:center}
    .auth-box p.sub{color:#64748b;font-size:.9rem;text-align:center;margin-bottom:28px}
    .form-group{margin-bottom:20px}
    .form-label{display:block;font-size:.85rem;font-weight:600;color:#374151;margin-bottom:6px}
    .input-wrapper{position:relative}
    .input-wrapper i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:.9rem;pointer-events:none}
    .form-input{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px 12px 40px;font-size:.9rem;font-family:'Inter',sans-serif;color:#1e293b;outline:none;transition:border-color .2s}
    .form-input:focus{border-color:#0052CC;box-shadow:0 0 0 3px rgba(0,82,204,.1)}
    .btn-primary{width:100%;background:#0052CC;color:#fff;border:none;border-radius:10px;padding:13px;font-size:.95rem;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;transition:all .25s}
    .btn-primary:hover{background:#003d99}
    .back-link{display:block;text-align:center;margin-top:20px;font-size:.85rem;color:#64748b}
    .back-link a{color:#0052CC;font-weight:600;text-decoration:none}
    .back-link a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="auth-box">
    <div class="auth-logo"><a href="../../index.html"><img src="../../assets/images/logo.png" alt="Globex Sky" width="160" height="50" style="object-fit:contain"></a></div>
    <h2>Forgot Password?</h2>
    <p class="sub">Enter your registered email or phone number. We'll send you a one-time password (OTP) to reset your password.</p>
    <form id="forgotForm" onsubmit="return submitForgot(event)">
      <div class="form-group">
        <label class="form-label" for="identifier">Email or Phone <span style="color:#ef4444">*</span></label>
        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>
          <input class="form-input" type="text" id="identifier" name="identifier" placeholder="your@email.com or +880..." required>
        </div>
      </div>
      <button type="submit" class="btn-primary"><i class="fas fa-paper-plane"></i> Send OTP</button>
    </form>
    <p class="back-link"><a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
  </div>
  <script>
    function submitForgot(e){
      e.preventDefault();
      const id = document.getElementById('identifier').value.trim();
      if(!id){alert('Please enter your email or phone.');return;}
      localStorage.setItem('gs_reset_identifier', id);
      window.location.href='verify.html?mode=reset';
    }
  </script>
  <script src="../../assets/js/main.js" defer></script>
</body>
</html>
