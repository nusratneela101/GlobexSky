<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password | Globex Sky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <link rel="stylesheet" href="../../assets/css/main.css"/>
  <link rel="stylesheet" href="../../assets/css/animations.css"/>
  <link rel="stylesheet" href="../../assets/css/responsive.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#f4f6fa;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .auth-box{background:#fff;border-radius:20px;padding:48px 40px;max-width:460px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.1);margin:24px 16px}
    .auth-logo{display:flex;justify-content:center;margin-bottom:32px}
    .auth-box h2{font-family:'Poppins',sans-serif;font-size:1.6rem;font-weight:700;color:#0A0E27;margin-bottom:8px;text-align:center}
    .auth-box p.sub{color:#64748b;font-size:.9rem;text-align:center;margin-bottom:28px}
    .form-group{margin-bottom:20px}
    .form-label{display:block;font-size:.85rem;font-weight:600;color:#374151;margin-bottom:6px}
    .input-wrapper{position:relative}
    .input-wrapper i.icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:.9rem;pointer-events:none}
    .form-input{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px 12px 40px;font-size:.9rem;font-family:'Inter',sans-serif;color:#1e293b;outline:none;transition:border-color .2s}
    .form-input:focus{border-color:#0052CC;box-shadow:0 0 0 3px rgba(0,82,204,.1)}
    .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;padding:0;font-size:.9rem}
    .strength-bar{height:5px;border-radius:3px;background:#e2e8f0;overflow:hidden;margin-top:6px}
    .strength-fill{height:100%;width:0;border-radius:3px;transition:width .4s,background .4s;background:#ef4444}
    .strength-text{font-size:.75rem;color:#64748b;margin-top:4px}
    .btn-primary{width:100%;background:#0052CC;color:#fff;border:none;border-radius:10px;padding:13px;font-size:.95rem;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;transition:all .25s}
    .btn-primary:hover{background:#003d99}
    .back-link{display:block;text-align:center;margin-top:20px;font-size:.85rem;color:#64748b}
    .back-link a{color:#0052CC;font-weight:600;text-decoration:none}
  </style>
</head>
<body>
  <div class="auth-box">
    <div class="auth-logo"><a href="../../index.html"><img src="../../assets/images/logo.png" alt="Globex Sky" width="160" height="50" style="object-fit:contain"></a></div>
    <h2>Reset Password</h2>
    <p class="sub">Enter a new strong password for your Globex Sky account.</p>
    <form id="resetForm" onsubmit="return submitReset(event)">
      <div class="form-group">
        <label class="form-label" for="newpw">New Password <span style="color:#ef4444">*</span></label>
        <div class="input-wrapper">
          <i class="fas fa-lock icon"></i>
          <input class="form-input" type="password" id="newpw" name="newpw" placeholder="Min 8 characters" required minlength="8" oninput="checkStrength(this.value)">
          <button type="button" class="toggle-pw" onclick="toggleVis('newpw',this)"><i class="fas fa-eye"></i></button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthBar"></div></div>
        <div class="strength-text" id="strengthText">Password strength</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirmpw">Confirm Password <span style="color:#ef4444">*</span></label>
        <div class="input-wrapper">
          <i class="fas fa-lock icon"></i>
          <input class="form-input" type="password" id="confirmpw" name="confirmpw" placeholder="Re-enter password" required minlength="8">
          <button type="button" class="toggle-pw" onclick="toggleVis('confirmpw',this)"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <button type="submit" class="btn-primary"><i class="fas fa-check-circle"></i> Reset Password</button>
    </form>
    <p class="back-link"><a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
  </div>
  <script>
    function toggleVis(id, btn){
      const inp = document.getElementById(id);
      const icon = btn.querySelector('i');
      if(inp.type==='password'){inp.type='text';icon.className='fas fa-eye-slash';}
      else{inp.type='password';icon.className='fas fa-eye';}
    }
    function checkStrength(v){
      let s=0;
      if(v.length>=8)s++;
      if(/[A-Z]/.test(v))s++;
      if(/[0-9]/.test(v))s++;
      if(/[^A-Za-z0-9]/.test(v))s++;
      const bar=document.getElementById('strengthBar');
      const txt=document.getElementById('strengthText');
      const colors=['#ef4444','#f97316','#eab308','#22c55e'];
      const labels=['Weak','Fair','Good','Strong'];
      bar.style.width=(s*25)+'%';
      bar.style.background=colors[s-1]||'#e2e8f0';
      txt.textContent=s>0?labels[s-1]:'Password strength';
    }
    function submitReset(e){
      e.preventDefault();
      const p1=document.getElementById('newpw').value;
      const p2=document.getElementById('confirmpw').value;
      if(p1!==p2){alert('Passwords do not match.');return;}
      alert('Password reset successful! Please log in.');
      window.location.href='login.html';
    }
  </script>
  <script src="../../assets/js/main.js" defer></script>
</body>
</html>
