<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat – Globex Sky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <link rel="stylesheet" href="../../assets/css/main.css"/>
  <link rel="stylesheet" href="../../assets/css/animations.css"/>
  <link rel="stylesheet" href="../../assets/css/responsive.css"/>
  <link rel="stylesheet" href="../../assets/css/chat.css"/>
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────────────────────────── -->
  <header class="site-header" role="banner">
    <nav class="navbar" role="navigation" aria-label="Main navigation">
      <div class="nav-container">
        <a href="../../index.html" class="nav-logo" aria-label="Globex Sky Home">
          <img src="../../assets/images/logo.png" alt="Globex Sky Logo" width="160" height="50" style="object-fit:contain"/>
        </a>
        <div style="flex:1;"></div>
        <a href="../account/notifications.html" class="icon-btn" title="Notifications" style="position:relative;margin-right:8px;">
          <i class="fas fa-bell"></i>
          <span class="notification-badge" style="position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;border-radius:50%;width:18px;height:18px;font-size:.65rem;font-weight:700;display:none;align-items:center;justify-content:center;"></span>
        </a>
        <a href="../account/profile.html" class="btn btn-outline" style="font-size:.82rem;">My Account</a>
      </div>
    </nav>
  </header>

  <!-- ── Page wrapper ───────────────────────────────────────────────────── -->
  <main style="max-width:1400px;margin:0 auto;padding:20px 16px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
      <h1 style="font-family:'Poppins',sans-serif;font-size:1.3rem;font-weight:700;color:#0a0e27;display:flex;align-items:center;gap:10px;">
        <i class="fas fa-comments" style="color:#0052CC;"></i> Messages
      </h1>
      <button id="newChatBtn" class="btn btn-primary" style="font-size:.85rem;">
        <i class="fas fa-plus"></i> New Conversation
      </button>
    </div>

    <!-- ── Chat layout ──────────────────────────────────────────────────── -->
    <div class="chat-layout">

      <!-- ── Sidebar ────────────────────────────────────────────────────── -->
      <aside class="chat-sidebar" id="chatSidebar">
        <div class="chat-sidebar-header">
          <div class="chat-sidebar-title">
            Conversations
            <span style="font-size:.75rem;color:#94a3b8;font-weight:400;" id="convCount"></span>
          </div>
          <div class="chat-search">
            <i class="fas fa-search"></i>
            <input type="search" id="convSearch" placeholder="Search conversations…" aria-label="Search conversations"/>
          </div>
        </div>
        <div class="conversation-list" id="conversationList" role="list" aria-label="Conversations">
          <div style="padding:24px;text-align:center;color:#94a3b8;font-size:.85rem;">Loading…</div>
        </div>
      </aside>

      <!-- ── Chat window ─────────────────────────────────────────────────── -->
      <div style="display:flex;flex-direction:column;position:relative;overflow:hidden;">

        <!-- Empty state (no conversation selected) -->
        <div id="chatEmptyState" class="chat-empty-state">
          <i class="fas fa-comments"></i>
          <h3>Select a Conversation</h3>
          <p>Choose a conversation from the sidebar, or start a new one to begin messaging.</p>
          <button id="newChatBtnAlt" class="btn btn-primary" style="margin-top:16px;font-size:.85rem;">
            <i class="fas fa-plus"></i> New Conversation
          </button>
        </div>

        <!-- Active chat window -->
        <div id="chatWindow" class="chat-window" style="display:none;">

          <!-- Header -->
          <div class="chat-header" id="chatHeader">
            <button class="icon-btn back-btn" id="backBtn" title="Back" style="display:none;" aria-label="Back">
              <i class="fas fa-arrow-left"></i>
            </button>
            <div class="conv-avatar-initials" id="headerAvatar" style="width:38px;height:38px;font-size:.8rem;">?</div>
            <div class="chat-header-info">
              <div class="chat-header-name" id="headerName">Chat</div>
              <div class="chat-header-status">
                <span class="dot offline" id="headerStatusDot"></span>
                <span id="headerStatusText"> Offline</span>
              </div>
            </div>
            <div class="chat-header-actions">
              <button class="icon-btn" title="Voice call" aria-label="Voice call">
                <i class="fas fa-phone"></i>
              </button>
              <button class="icon-btn" id="videoCallBtn" title="Video call" aria-label="Video call">
                <i class="fas fa-video"></i>
              </button>
              <div style="position:relative;display:flex;align-items:center;">
                <label class="translate-toggle" title="Auto-translate messages">
                  <input type="checkbox" id="translateToggle"/>
                  <i class="fas fa-language" style="font-size:1rem;color:#0052CC;"></i>
                  <span>Translate</span>
                </label>
              </div>
            </div>
          </div>

          <!-- Messages -->
          <div class="messages-area" id="messagesArea" role="log" aria-live="polite" aria-label="Messages">
            <!-- Messages injected by chat.js -->
          </div>

          <!-- Typing indicator -->
          <div class="typing-indicator" id="typingIndicator" style="display:none;padding:4px 20px;">
            <div class="typing-dots"><span></span><span></span><span></span></div>
            <span id="typingName">Typing…</span>
          </div>

          <!-- Input area -->
          <div class="chat-input-area">
            <div class="chat-input-toolbar">
              <button class="toolbar-btn" id="attachBtn" title="Attach file" aria-label="Attach file">
                <i class="fas fa-paperclip"></i>
              </button>
              <button class="toolbar-btn" title="Send image" aria-label="Send image" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-image"></i>
              </button>
              <button class="toolbar-btn" title="Voice message" aria-label="Voice message">
                <i class="fas fa-microphone"></i>
              </button>
              <input type="file" id="fileInput" accept="*/*" style="display:none;" aria-hidden="true"/>
            </div>
            <div class="chat-input-row">
              <div class="chat-input-wrapper" style="position:relative;">
                <textarea
                  id="chatTextarea"
                  class="chat-textarea"
                  placeholder="Type a message… (Enter to send)"
                  rows="1"
                  aria-label="Message input"
                ></textarea>
                <button class="emoji-btn" id="emojiBtn" type="button" title="Emoji" aria-label="Emoji picker">😊</button>
                <!-- Emoji picker -->
                <div id="emojiPicker" class="emoji-picker" style="display:none;" role="listbox" aria-label="Emoji picker"></div>
              </div>
              <button class="send-btn" id="sendBtn" title="Send message" aria-label="Send">
                <i class="fas fa-paper-plane"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- ── New Conversation Modal ─────────────────────────────────────────── -->
  <div class="modal-overlay" id="newChatModal" role="dialog" aria-modal="true" aria-labelledby="newChatModalTitle">
    <div class="modal">
      <div class="modal-title">
        <span id="newChatModalTitle"><i class="fas fa-plus-circle" style="color:#0052CC;"></i> New Conversation</span>
        <button class="icon-btn" data-close-modal aria-label="Close" style="background:#f1f5f9;">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <form id="startChatForm">
        <div style="margin-bottom:16px;">
          <label style="display:block;font-size:.85rem;font-weight:600;color:#374151;margin-bottom:6px;">
            Supplier / User ID or Email
          </label>
          <input
            type="text"
            id="newChatParticipant"
            class="form-input"
            placeholder="Enter user ID or email…"
            required
            style="width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:.88rem;outline:none;transition:border-color .2s;font-family:'Inter',sans-serif;"
            aria-label="Participant ID or email"
          />
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;">
          <button type="button" data-close-modal class="btn btn-outline">Cancel</button>
          <button type="submit" class="btn btn-primary">Start Chat</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Footer ─────────────────────────────────────────────────────────── -->
  <footer style="background:#0a0e27;color:#9ca3af;text-align:center;padding:20px;margin-top:32px;font-size:.82rem;">
    <p>&copy; 2025 Globex International Trade Co., Ltd. All rights reserved.</p>
  </footer>

  <script src="../../assets/js/config.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
  <script src="../../assets/js/notifications.js"></script>
  <script src="../../assets/js/chat.js"></script>
  <script>
    // Handle new chat alt button
    document.getElementById('newChatBtnAlt') && document.getElementById('newChatBtnAlt').addEventListener('click', function() {
      var modal = document.getElementById('newChatModal');
      if (modal) modal.classList.add('open');
    });
    // Video call button → redirect to meetings schedule
    document.getElementById('videoCallBtn') && document.getElementById('videoCallBtn').addEventListener('click', function() {
      window.location.href = '../communication/meeting.html';
    });
    // Mobile back button
    document.getElementById('backBtn') && document.getElementById('backBtn').addEventListener('click', function() {
      var sidebar = document.getElementById('chatSidebar');
      var chatWindow = document.getElementById('chatWindow');
      var emptyState = document.getElementById('chatEmptyState');
      if (sidebar) sidebar.classList.add('mobile-open');
      if (chatWindow) chatWindow.style.display = 'none';
      if (emptyState) emptyState.style.display = 'flex';
    });
  </script>
  <script src="../../assets/js/communication.js"></script>
</body>
</html>
