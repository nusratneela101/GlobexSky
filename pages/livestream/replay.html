<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Stream Replay – Globex Sky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../../assets/css/main.css"/>
  <link rel="stylesheet" href="../../assets/css/livestream.css"/>
  <link rel="stylesheet" href="../../assets/css/responsive.css" />
  <link rel="stylesheet" href="../../assets/css/mobile.css" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}

    /* ── Top bar ── */
    .page-topbar{background:#161b22;padding:12px 24px;display:flex;align-items:center;gap:16px;
      border-bottom:1px solid #30363d;position:sticky;top:0;z-index:100}
    .brand-logo{font-family:'Poppins',sans-serif;font-weight:700;font-size:1.05rem;color:#fff;
      text-decoration:none}
    .brand-logo span{color:#0052CC}
    .topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
    .btn{padding:9px 20px;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;
      border:none;transition:all .2s;display:inline-flex;align-items:center;gap:7px;text-decoration:none}
    .btn-primary{background:#0052CC;color:#fff}
    .btn-primary:hover{background:#003d99}
    .btn-outline{background:transparent;color:#8b949e;border:1px solid #30363d}
    .btn-outline:hover{background:#1c2128;color:#e6edf3}
    .btn-sm{padding:6px 14px;font-size:.8rem}
    .btn-icon{padding:8px;border-radius:8px}

    /* ── Layout ── */
    .replay-wrapper{display:grid;grid-template-columns:1fr 340px;min-height:calc(100vh - 57px)}
    @media(max-width:900px){.replay-wrapper{grid-template-columns:1fr}}

    /* ── Main column ── */
    .replay-main{display:flex;flex-direction:column;border-right:1px solid #30363d}
    .video-container{background:#000;position:relative}
    .video-player{width:100%;aspect-ratio:16/9;background:#000;display:block}

    .replay-info-bar{padding:16px 20px;border-bottom:1px solid #30363d}
    .replay-badge{background:#374151;color:#9ca3af;font-size:.72rem;font-weight:700;
      padding:3px 10px;border-radius:5px;letter-spacing:.5px;margin-right:8px}
    .replay-title{font-family:'Poppins',sans-serif;font-size:1.05rem;font-weight:600;
      color:#e6edf3;margin:8px 0 6px}
    .replay-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap;font-size:.82rem;color:#8b949e}
    .replay-meta i{color:#0052CC;font-size:.75rem}
    .replay-actions{display:flex;gap:8px;margin-left:auto}
    .replay-meta-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}

    /* ── Host info ── */
    .host-section{padding:14px 20px;border-bottom:1px solid #30363d;display:flex;
      align-items:center;gap:14px}
    .host-avatar{width:44px;height:44px;border-radius:50%;background:#0052CC;
      display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;
      color:#fff;flex-shrink:0}
    .host-info{flex:1;min-width:0}
    .host-name{font-weight:600;font-size:.9rem;color:#e6edf3}
    .host-sub{font-size:.78rem;color:#8b949e;margin-top:2px}
    .host-section .btn{flex-shrink:0}

    /* ── Featured products ── */
    .products-section{padding:16px 20px;border-bottom:1px solid #30363d}
    .section-label{font-family:'Poppins',sans-serif;font-size:.85rem;font-weight:600;
      color:#e6edf3;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .section-label i{color:#0052CC}
    .products-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;
      scrollbar-width:thin;scrollbar-color:#30363d transparent}
    .product-card{background:#1c2128;border:1px solid #30363d;border-radius:10px;
      width:140px;flex-shrink:0;overflow:hidden;transition:border-color .2s}
    .product-card:hover{border-color:#0052CC}
    .product-img{width:100%;aspect-ratio:1;object-fit:cover;background:#161b22}
    .product-body{padding:8px}
    .product-name{font-size:.75rem;color:#c9d1d9;overflow:hidden;text-overflow:ellipsis;
      white-space:nowrap;margin-bottom:3px}
    .product-price{font-size:.82rem;font-weight:700;color:#0052CC;margin-bottom:6px}
    .btn-buy{width:100%;background:#0052CC;color:#fff;border:none;border-radius:6px;
      padding:5px 0;font-size:.73rem;font-weight:700;cursor:pointer;transition:background .2s}
    .btn-buy:hover{background:#003d99}

    /* ── Analytics stats ── */
    .stats-section{padding:16px 20px}
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .stat-box{background:#1c2128;border:1px solid #30363d;border-radius:10px;
      padding:12px;text-align:center}
    .stat-value{font-family:'Poppins',sans-serif;font-size:1.2rem;font-weight:700;
      color:#e6edf3;margin-bottom:3px}
    .stat-label{font-size:.72rem;color:#8b949e}

    /* ── Right column: timeline chat ── */
    .replay-sidebar{display:flex;flex-direction:column;overflow:hidden;max-height:calc(100vh - 57px)}
    @media(max-width:900px){.replay-sidebar{max-height:400px}}
    .sidebar-header{padding:14px 16px;border-bottom:1px solid #30363d;background:#161b22}
    .sidebar-title{font-family:'Poppins',sans-serif;font-size:.88rem;font-weight:600;color:#e6edf3;
      display:flex;align-items:center;gap:8px}
    .replay-tabs{display:flex;gap:0;margin-top:10px;background:#1c2128;border-radius:8px;overflow:hidden}
    .replay-tab{flex:1;padding:7px;text-align:center;font-size:.78rem;font-weight:600;
      cursor:pointer;color:#8b949e;transition:all .2s;border:none;background:transparent}
    .replay-tab.active{background:#0052CC;color:#fff}

    .chat-replay-feed{flex:1;overflow-y:auto;padding:12px 14px;display:flex;
      flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:#30363d transparent}
    .chat-msg{display:flex;gap:8px;align-items:flex-start}
    .chat-avatar{width:26px;height:26px;border-radius:50%;background:#374151;
      display:flex;align-items:center;justify-content:center;font-size:.65rem;
      font-weight:700;color:#e6edf3;flex-shrink:0;margin-top:1px}
    .chat-content{flex:1;min-width:0}
    .chat-author-row{display:flex;align-items:center;gap:6px;margin-bottom:2px}
    .chat-author{font-size:.75rem;font-weight:600;color:#c9d1d9}
    .chat-timestamp{font-size:.65rem;color:#8b949e}
    .chat-text{font-size:.82rem;color:#e6edf3;line-height:1.4}

    /* ── Related streams ── */
    .related-section{padding:20px 24px;border-top:1px solid #30363d;background:#0d1117}
    .related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
    .related-card{background:#161b22;border:1px solid #30363d;border-radius:10px;
      overflow:hidden;transition:border-color .2s;text-decoration:none;display:block}
    .related-card:hover{border-color:#0052CC}
    .related-thumb{aspect-ratio:16/9;background:#1c2128;position:relative;overflow:hidden}
    .related-thumb img{width:100%;height:100%;object-fit:cover}
    .related-thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;
      justify-content:center}
    .related-thumb-placeholder i{font-size:1.8rem;color:#30363d}
    .replay-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      background:rgba(0,0,0,.6);width:36px;height:36px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;color:#fff;font-size:.85rem}
    .related-body{padding:10px}
    .related-title{font-size:.82rem;font-weight:600;color:#e6edf3;margin-bottom:4px;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .related-meta{font-size:.72rem;color:#8b949e}

    /* ── Unavailable state ── */
    .video-unavailable{display:flex;flex-direction:column;align-items:center;justify-content:center;
      aspect-ratio:16/9;background:#0d1117;color:#8b949e;gap:12px;padding:24px;text-align:center}
    .video-unavailable i{font-size:2.5rem;color:#30363d}
    .video-unavailable h3{font-family:'Poppins',sans-serif;font-size:1rem;font-weight:600;color:#e6edf3}
    .video-unavailable p{font-size:.85rem;max-width:320px;line-height:1.6}

    /* ── Loading ── */
    .skeleton{background:linear-gradient(90deg,#1c2128 25%,#30363d 50%,#1c2128 75%);
      background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* ── Toast ── */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      background:#22c55e;color:#fff;padding:10px 24px;border-radius:20px;
      font-weight:600;font-size:.85rem;z-index:9999;opacity:0;transition:opacity .3s;
      pointer-events:none}
    .toast.show{opacity:1}
  </style>
</head>
<body>

<!-- Top bar -->
<header class="page-topbar">
  <a href="../../index.html" class="brand-logo">Globex<span>Sky</span></a>
  <span style="color:#30363d">|</span>
  <span style="font-family:'Poppins',sans-serif;font-size:.9rem;font-weight:600">
    <i class="fas fa-film" style="color:#0052CC;margin-right:6px"></i>Replay
  </span>
  <div class="topbar-right">
    <a href="browse.html" class="btn btn-outline btn-sm"><i class="fas fa-circle" style="color:#ef4444"></i> Live Now</a>
    <a href="upcoming.html" class="btn btn-outline btn-sm"><i class="fas fa-calendar"></i> Upcoming</a>
    <a href="index.html" class="btn btn-outline btn-sm"><i class="fas fa-arrow-left"></i> Back</a>
  </div>
</header>

<div class="replay-wrapper">
  <!-- ── Main (left) ── -->
  <div class="replay-main">

    <!-- Video player -->
    <div class="video-container">
      <!-- HLS.js player or native <video> for recorded streams -->
      <video id="replay-player" class="video-player" controls playsinline
             poster="" preload="metadata">
        <p style="color:#8b949e;padding:20px">
          Your browser does not support HTML5 video.
          <a href="#" style="color:#0052CC">Download the replay</a>.
        </p>
      </video>
    </div>

    <!-- Info bar -->
    <div class="replay-info-bar">
      <div class="replay-meta-row">
        <div>
          <span class="replay-badge"><i class="fas fa-film"></i> REPLAY</span>
          <span id="stream-category" class="replay-badge" style="background:rgba(0,82,204,.2);color:#60a5fa"></span>
        </div>
        <div class="replay-actions">
          <button class="btn btn-outline btn-icon" id="btn-share" title="Share replay">
            <i class="fas fa-share-nodes"></i>
          </button>
          <button class="btn btn-outline btn-icon" id="btn-download" title="Download" style="display:none">
            <i class="fas fa-download"></i>
          </button>
        </div>
      </div>
      <h1 class="replay-title" id="stream-title">Loading replay…</h1>
      <div class="replay-meta">
        <span><i class="fas fa-calendar"></i> <span id="stream-date">—</span></span>
        <span><i class="fas fa-clock"></i> <span id="stream-duration">—</span></span>
        <span><i class="fas fa-eye"></i> <span id="stream-views">—</span> peak viewers</span>
        <span><i class="fas fa-comment"></i> <span id="stream-messages">—</span> comments</span>
      </div>
    </div>

    <!-- Host info -->
    <div class="host-section">
      <div class="host-avatar" id="host-avatar">?</div>
      <div class="host-info">
        <div class="host-name" id="host-name">Loading host…</div>
        <div class="host-sub" id="host-sub">Supplier</div>
      </div>
      <a href="#" class="btn btn-primary btn-sm" id="btn-visit-store">
        <i class="fas fa-store"></i> Visit Store
      </a>
      <button class="btn btn-outline btn-sm" id="btn-follow-host">
        <i class="fas fa-user-plus"></i> Follow
      </button>
    </div>

    <!-- Featured products -->
    <div class="products-section">
      <div class="section-label"><i class="fas fa-tag"></i> Products Featured in this Stream</div>
      <div class="products-scroll" id="products-carousel">
        <div class="skeleton" style="width:140px;height:160px;flex-shrink:0"></div>
        <div class="skeleton" style="width:140px;height:160px;flex-shrink:0"></div>
        <div class="skeleton" style="width:140px;height:160px;flex-shrink:0"></div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-section">
      <div class="section-label"><i class="fas fa-chart-line"></i> Stream Stats</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-value" id="stat-peak">—</div>
          <div class="stat-label">Peak Viewers</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="stat-duration">—</div>
          <div class="stat-label">Duration</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="stat-messages">—</div>
          <div class="stat-label">Chat Messages</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Sidebar (right) ── -->
  <div class="replay-sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">
        <i class="fas fa-film" style="color:#0052CC"></i> Replay Chat
      </div>
      <div class="replay-tabs">
        <button class="replay-tab active" data-tab="chat">
          <i class="fas fa-comment"></i> Chat
        </button>
        <button class="replay-tab" data-tab="products">
          <i class="fas fa-tag"></i> Products
        </button>
      </div>
    </div>

    <!-- Chat replay feed -->
    <div class="chat-replay-feed" id="chat-replay-feed">
      <!-- Messages loaded dynamically -->
      <div style="text-align:center;color:#8b949e;padding:20px;font-size:.85rem">
        <i class="fas fa-spinner fa-spin" style="margin-bottom:8px;display:block;font-size:1.5rem;color:#30363d"></i>
        Loading chat replay…
      </div>
    </div>
  </div>
</div>

<!-- Related streams -->
<section class="related-section">
  <div style="font-family:'Poppins',sans-serif;font-size:1rem;font-weight:700;color:#e6edf3;
              margin-bottom:16px;display:flex;align-items:center;gap:8px">
    <i class="fas fa-film" style="color:#0052CC"></i> More Replays
  </div>
  <div class="related-grid" id="related-grid">
    <!-- Populated dynamically -->
  </div>
</section>

<div class="toast" id="toast"><i class="fas fa-check" style="margin-right:8px"></i><span id="toast-text"></span></div>

<script>
(function () {
  'use strict';

  const params   = new URLSearchParams(window.location.search);
  const streamId = params.get('id') || params.get('stream');

  /* ── Helpers ── */
  function esc(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function showToast(msg, icon='check') {
    const t = document.getElementById('toast');
    const tx = document.getElementById('toast-text');
    if (!t||!tx) return;
    tx.textContent = msg;
    const i = t.querySelector('i');
    if(i) i.className = `fas fa-${icon}`;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(()=>t.classList.remove('show'), 3000);
  }

  function formatDuration(seconds) {
    if (!seconds) return '—';
    const h = Math.floor(seconds/3600);
    const m = Math.floor((seconds%3600)/60);
    const s = seconds%60;
    return h ? `${h}h ${m}m` : `${m}m ${s}s`;
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', {
      year:'numeric', month:'long', day:'numeric',
      hour:'2-digit', minute:'2-digit'
    });
  }

  /* ── Mock data ── */
  const MOCK_STREAM = {
    id: streamId || 'demo',
    title: 'Industrial Machinery Showcase – Live Replay',
    supplier: { company_name: 'TechForge Industries' },
    category: 'Machinery',
    status: 'ended',
    recording_url: null,
    thumbnail: null,
    peak_viewers: 1284,
    viewer_count: 843,
    duration_seconds: 5400,
    message_count: 312,
    started_at: new Date(Date.now() - 2 * 24 * 60 * 60 * 1000).toISOString(),
    ended_at: new Date(Date.now() - 2 * 24 * 60 * 60 * 1000 + 5400000).toISOString(),
    products: [
      { id:'p1', name:'CNC Machine Pro', price:1200, images:[] },
      { id:'p2', name:'Hydraulic Pump HX-40', price:280, images:[] },
      { id:'p3', name:'Industrial Motor X200', price:420, images:[] },
    ],
  };

  const MOCK_CHAT = [
    { user:{full_name:'Ahmed K.'}, message:'This CNC looks amazing!', created_at: new Date(Date.now() - 2*24*3600*1000 + 300000).toISOString() },
    { user:{full_name:'Priya M.'}, message:'What is the MOQ for the motors?', created_at: new Date(Date.now() - 2*24*3600*1000 + 600000).toISOString() },
    { user:{full_name:'Lucas D.'}, message:'Can you show the specs sheet?', created_at: new Date(Date.now() - 2*24*3600*1000 + 900000).toISOString() },
    { user:{full_name:'Sarah C.'}, message:'Already added to cart!', created_at: new Date(Date.now() - 2*24*3600*1000 + 1200000).toISOString() },
    { user:{full_name:'Raj P.'}, message:'What warranty do you offer?', created_at: new Date(Date.now() - 2*24*3600*1000 + 1500000).toISOString() },
  ];

  /* ── Fetch stream data ── */
  async function fetchStream(id) {
    if (!id) return MOCK_STREAM;
    try {
      const res = await fetch(`/api/v1/livestream/${id}`);
      if (!res.ok) throw new Error();
      const json = await res.json();
      return json.data || MOCK_STREAM;
    } catch (_) { return MOCK_STREAM; }
  }

  async function fetchChat(id) {
    if (!id) return MOCK_CHAT;
    try {
      const res = await fetch(`/api/v1/livestream/${id}/chat?limit=100`);
      if (!res.ok) throw new Error();
      const json = await res.json();
      return json.data || MOCK_CHAT;
    } catch (_) { return MOCK_CHAT; }
  }

  async function fetchRelated() {
    try {
      const res = await fetch('/api/v1/livestream/?status=ended&limit=4');
      if (!res.ok) throw new Error();
      const json = await res.json();
      return (json.data || []).slice(0,4);
    } catch (_) { return []; }
  }

  /* ── Render stream ── */
  function renderStream(stream) {
    document.title = `Replay: ${stream.title} – Globex Sky`;

    setText('stream-title', stream.title);
    setText('stream-category', stream.category || '');
    setText('stream-date', stream.started_at ? formatDate(stream.started_at) : '—');
    setText('stream-duration', formatDuration(stream.duration_seconds));
    setText('stream-views', (stream.peak_viewers || 0).toLocaleString());
    setText('stream-messages', (stream.message_count || 0).toLocaleString());

    // Host
    const hostInitial = (stream.supplier?.company_name || '?').charAt(0).toUpperCase();
    setText('host-avatar', hostInitial);
    setText('host-name', stream.supplier?.company_name || 'Unknown Supplier');

    // Stats
    setText('stat-peak', (stream.peak_viewers || 0).toLocaleString());
    setText('stat-duration', formatDuration(stream.duration_seconds));
    setText('stat-messages', (stream.message_count || 0).toLocaleString());

    // Video
    const player = document.getElementById('replay-player');
    if (player) {
      if (stream.recording_url) {
        loadVideo(player, stream.recording_url);
      } else {
        player.outerHTML = `
          <div class="video-unavailable">
            <i class="fas fa-film"></i>
            <h3>Recording Not Available</h3>
            <p>The recording for this stream is not yet ready or was not saved. Check back later.</p>
            <a href="browse.html" class="btn btn-primary btn-sm" style="display:inline-flex;margin-top:8px">
              <i class="fas fa-circle" style="color:#ef4444"></i> Watch Live Streams
            </a>
          </div>`;
      }
    }

    // Products carousel
    renderProducts(stream.products || []);
  }

  function setText(id, val) {
    const el = document.getElementById(id);
    if (el) el.textContent = val;
  }

  function loadVideo(player, url) {
    // Try HLS.js for .m3u8 streams, fallback to native
    if (url.includes('.m3u8') && typeof Hls !== 'undefined' && Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(player);
    } else if (player.canPlayType('application/vnd.apple.mpegurl') && url.includes('.m3u8')) {
      player.src = url;
    } else {
      player.src = url;
    }
    if (player.poster) player.poster = '';
  }

  /* ── Render products ── */
  function renderProducts(products) {
    const carousel = document.getElementById('products-carousel');
    if (!carousel) return;
    if (!products.length) {
      carousel.innerHTML = `<p style="color:#8b949e;font-size:.85rem;padding:4px 0">No products were featured in this stream.</p>`;
      return;
    }
    carousel.innerHTML = products.map(p => `
      <div class="product-card">
        ${p.images?.[0]
          ? `<img class="product-img" src="${esc(p.images[0])}" alt="${esc(p.name)}" loading="lazy"
                  onerror="this.src='../../assets/images/placeholder.png'"/>`
          : `<div class="product-img" style="display:flex;align-items:center;justify-content:center">
              <i class="fas fa-box" style="color:#30363d;font-size:1.4rem"></i>
            </div>`}
        <div class="product-body">
          <div class="product-name">${esc(p.name)}</div>
          <div class="product-price">$${parseFloat(p.price||0).toFixed(2)}</div>
          <button class="btn-buy" data-product-id="${esc(p.id)}">
            <i class="fas fa-cart-shopping"></i> Buy Now
          </button>
        </div>
      </div>`).join('');

    carousel.addEventListener('click', function(e) {
      const btn = e.target.closest('.btn-buy');
      if (btn) {
        showToast('Opening product page…', 'arrow-right');
        setTimeout(() => {
          window.location.href = `../product/detail.html?id=${btn.dataset.productId}`;
        }, 600);
      }
    });
  }

  /* ── Render chat ── */
  function renderChat(messages) {
    const feed = document.getElementById('chat-replay-feed');
    if (!feed) return;
    if (!messages.length) {
      feed.innerHTML = `<p style="color:#8b949e;font-size:.82rem;text-align:center;padding:20px">No chat messages recorded.</p>`;
      return;
    }
    feed.innerHTML = messages.map(m => {
      const author = m.user?.full_name || 'Guest';
      const initial = author.charAt(0).toUpperCase();
      const time = m.created_at
        ? new Date(m.created_at).toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'})
        : '';
      return `
        <div class="chat-msg">
          <div class="chat-avatar">${esc(initial)}</div>
          <div class="chat-content">
            <div class="chat-author-row">
              <span class="chat-author">${esc(author)}</span>
              <span class="chat-timestamp">${esc(time)}</span>
            </div>
            <div class="chat-text">${esc(m.message)}</div>
          </div>
        </div>`;
    }).join('');
  }

  /* ── Render related ── */
  function renderRelated(streams) {
    const grid = document.getElementById('related-grid');
    if (!grid) return;
    if (!streams.length) {
      grid.innerHTML = `<p style="color:#8b949e;font-size:.85rem">No related replays available.</p>`;
      return;
    }
    grid.innerHTML = streams.map(s => `
      <a href="replay.html?id=${esc(s.id)}" class="related-card">
        <div class="related-thumb">
          ${s.thumbnail
            ? `<img src="${esc(s.thumbnail)}" alt="${esc(s.title)}" loading="lazy"/>`
            : `<div class="related-thumb-placeholder"><i class="fas fa-film"></i></div>`}
          <div class="replay-icon"><i class="fas fa-play"></i></div>
        </div>
        <div class="related-body">
          <div class="related-title">${esc(s.title)}</div>
          <div class="related-meta">${esc(s.supplier?.company_name||'')} · ${s.duration_seconds ? formatDuration(s.duration_seconds) : 'Replay'}</div>
        </div>
      </a>`).join('');
  }

  /* ── Tabs ── */
  document.querySelectorAll('.replay-tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.replay-tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      const target = this.dataset.tab;
      const chatFeed = document.getElementById('chat-replay-feed');
      if (chatFeed) chatFeed.style.display = target === 'chat' ? 'flex' : 'none';
    });
  });

  /* ── Share ── */
  document.getElementById('btn-share').addEventListener('click', function () {
    if (navigator.share) {
      navigator.share({
        title: document.getElementById('stream-title').textContent,
        url: window.location.href,
      }).catch(() => {});
    } else {
      navigator.clipboard.writeText(window.location.href)
        .then(() => showToast('Link copied!', 'link'))
        .catch(() => showToast('Copy the URL from your browser.', 'info'));
    }
  });

  document.getElementById('btn-follow-host').addEventListener('click', function() {
    this.innerHTML = '<i class="fas fa-check"></i> Following';
    this.disabled = true;
    showToast('Now following this supplier!', 'user-check');
  });

  /* ── Init ── */
  async function init() {
    const [stream, chat, related] = await Promise.all([
      fetchStream(streamId),
      fetchChat(streamId),
      fetchRelated(),
    ]);

    renderStream(stream);
    renderChat(chat);
    renderRelated(related);
  }

  init();
})();
</script>
</body>
</html>
