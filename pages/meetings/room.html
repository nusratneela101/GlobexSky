<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Video Meeting Room – Globex Sky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0d1117;color:#e6edf3;overflow:hidden;height:100vh;display:flex;flex-direction:column}
    .meeting-topbar{background:#161b22;padding:10px 20px;display:flex;align-items:center;gap:16px;border-bottom:1px solid #30363d;flex-shrink:0}
    .meeting-title{font-family:'Poppins',sans-serif;font-weight:600;font-size:1rem;color:#e6edf3}
    .room-code-badge{background:#0052CC;color:#fff;border-radius:6px;padding:4px 10px;font-size:.8rem;font-family:monospace;font-weight:700}
    .meeting-timer{font-size:.85rem;color:#8b949e;margin-left:auto}
    .meeting-layout{display:flex;flex:1;overflow:hidden}
    .video-grid{flex:1;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:6px;padding:8px;background:#0d1117;overflow-y:auto;align-content:start}
    .video-tile{background:#161b22;border-radius:12px;overflow:hidden;aspect-ratio:16/9;position:relative}
    .video-tile video{width:100%;height:100%;object-fit:cover;display:block}
    .video-tile-label{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.65);color:#fff;font-size:.78rem;padding:3px 8px;border-radius:4px;display:flex;align-items:center;gap:6px}
    .mic-off-icon{color:#ef4444}
    .local-tile{border:2px solid #0052CC}
    .meeting-controls{background:#161b22;padding:14px 24px;display:flex;align-items:center;justify-content:center;gap:16px;border-top:1px solid #30363d;flex-shrink:0}
    .ctrl-btn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .ctrl-btn.active{background:#374151;color:#fff}
    .ctrl-btn.active:hover{background:#4b5563}
    .ctrl-btn.muted{background:#ef4444;color:#fff}
    .ctrl-btn.end{background:#ef4444;color:#fff;width:auto;border-radius:12px;padding:0 24px;font-size:.9rem;font-weight:600;gap:8px}
    .ctrl-btn.end:hover{background:#dc2626}
    .ctrl-btn-label{font-size:.7rem;color:#8b949e;text-align:center;margin-top:4px}
    .ctrl-group{display:flex;flex-direction:column;align-items:center;gap:2px}
    .meeting-sidebar{width:300px;background:#161b22;border-left:1px solid #30363d;display:flex;flex-direction:column}
    .sidebar-tabs{display:flex;border-bottom:1px solid #30363d}
    .sidebar-tab{flex:1;padding:12px;background:none;border:none;color:#8b949e;cursor:pointer;font-size:.82rem;font-weight:500;border-bottom:2px solid transparent;transition:all .2s}
    .sidebar-tab.active{color:#e6edf3;border-bottom-color:#0052CC}
    .participants-list{flex:1;overflow-y:auto;padding:12px}
    .participant-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px}
    .participant-item:hover{background:#0d1117}
    .participant-avatar{width:36px;height:36px;border-radius:50%;background:#0052CC;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0;color:#fff}
    .participant-name{font-size:.88rem;flex:1}
    .participant-badges{display:flex;gap:4px}
    .p-badge{font-size:.75rem;color:#8b949e}
    .chat-area{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
    .chat-msg{display:flex;gap:8px;align-items:flex-start}
    .chat-avatar{width:28px;height:28px;border-radius:50%;background:#374151;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;color:#fff}
    .chat-bubble{background:#0d1117;border-radius:0 8px 8px 8px;padding:8px 10px;font-size:.82rem}
    .chat-user{font-weight:600;color:#0052CC;font-size:.75rem;margin-bottom:2px}
    .chat-input-area{padding:12px;border-top:1px solid #30363d;display:flex;gap:8px}
    .chat-input{flex:1;background:#0d1117;border:1px solid #30363d;color:#e6edf3;border-radius:8px;padding:8px 12px;font-size:.83rem;font-family:'Inter',sans-serif}
    .chat-input:focus{outline:none;border-color:#0052CC}
    .chat-send{background:#0052CC;color:#fff;border:none;border-radius:8px;width:36px;cursor:pointer;font-size:.9rem}
    @media(max-width:768px){.meeting-sidebar{display:none}.video-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>

<header class="meeting-topbar">
  <div>
    <div class="meeting-title" id="meetingTitle">Meeting Room</div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:3px">
      <span style="font-size:.75rem;color:#8b949e">Room Code:</span>
      <span class="room-code-badge" id="roomCode">------</span>
    </div>
  </div>
  <div class="meeting-timer" id="meetingTimer">00:00:00</div>
</header>

<div class="meeting-layout">
  <!-- Video Grid -->
  <div class="video-grid" id="videoGrid">
    <div class="video-tile local-tile" id="localTile">
      <video id="localVideo" autoplay muted playsinline></video>
      <div class="video-tile-label">
        <span>You (Host)</span>
        <i class="fas fa-microphone-slash mic-off-icon" id="localMicIcon" style="display:none"></i>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <aside class="meeting-sidebar">
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" onclick="switchSideTab('participants',this)">Participants (<span id="participantCount">1</span>)</button>
      <button class="sidebar-tab" onclick="switchSideTab('chat',this)">Chat</button>
    </div>

    <div id="participantsPanel" class="participants-list">
      <div class="participant-item">
        <div class="participant-avatar" id="localAvatar">Y</div>
        <div class="participant-name">You (Host)</div>
        <div class="participant-badges"><i class="fas fa-crown p-badge" style="color:#f59e0b" title="Host"></i></div>
      </div>
    </div>

    <div id="chatPanel" style="display:none;flex:1;overflow:hidden;flex-direction:column;display:none">
      <div class="chat-area" id="meetingChatArea">
        <div class="chat-msg">
          <div class="chat-avatar">S</div>
          <div class="chat-bubble"><div class="chat-user">System</div><div style="color:#c9d1d9">Meeting started. Chat is active.</div></div>
        </div>
      </div>
      <div class="chat-input-area">
        <input type="text" class="chat-input" id="meetingChatInput" placeholder="Message…" onkeydown="if(event.key==='Enter')sendMeetingChat()"/>
        <button class="chat-send" onclick="sendMeetingChat()"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </aside>
</div>

<!-- Controls Bar -->
<div class="meeting-controls">
  <div class="ctrl-group">
    <button class="ctrl-btn active" id="micBtn" onclick="toggleMic()"><i class="fas fa-microphone" id="micIcon"></i></button>
    <div class="ctrl-btn-label">Mic</div>
  </div>
  <div class="ctrl-group">
    <button class="ctrl-btn active" id="camBtn" onclick="toggleCam()"><i class="fas fa-video" id="camIcon"></i></button>
    <div class="ctrl-btn-label">Camera</div>
  </div>
  <div class="ctrl-group">
    <button class="ctrl-btn active" id="screenBtn" onclick="toggleScreen()"><i class="fas fa-desktop"></i></button>
    <div class="ctrl-btn-label">Share</div>
  </div>
  <div class="ctrl-group">
    <button class="ctrl-btn active" onclick="switchSideTab('participants',document.querySelector('.sidebar-tab'))"><i class="fas fa-users"></i></button>
    <div class="ctrl-btn-label">Participants</div>
  </div>
  <button class="ctrl-btn end" onclick="leaveMeeting()"><i class="fas fa-phone-slash"></i> Leave</button>
</div>

<script>
  const meetingId = new URLSearchParams(window.location.search).get('id');
  const token = localStorage.getItem('token');
  let localStream = null;
  let micOn = true;
  let camOn = true;
  let startTime = Date.now();

  // Load meeting details
  async function loadMeeting() {
    if (!meetingId) return;
    try {
      const res = await fetch(`/api/v1/video-meetings/${meetingId}`, { headers: { Authorization: `Bearer ${token}` } });
      const json = await res.json();
      if (!json.success) return;
      const m = json.data;
      document.getElementById('meetingTitle').textContent = m.title || 'Meeting Room';
      document.getElementById('roomCode').textContent = m.room_code || '------';
      document.title = (m.title || 'Meeting') + ' – Globex Sky';

      // Render participants
      const participants = m.participants || [];
      document.getElementById('participantCount').textContent = participants.length + 1;
    } catch (e) { console.error(e); }
  }

  async function initMedia() {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('localVideo').srcObject = localStream;
    } catch (e) {
      console.warn('Media access denied:', e.message);
    }
  }

  function toggleMic() {
    if (!localStream) return;
    micOn = !micOn;
    localStream.getAudioTracks().forEach(t => t.enabled = micOn);
    const btn = document.getElementById('micBtn');
    const icon = document.getElementById('micIcon');
    btn.className = 'ctrl-btn ' + (micOn ? 'active' : 'muted');
    icon.className = 'fas fa-microphone' + (micOn ? '' : '-slash');
    document.getElementById('localMicIcon').style.display = micOn ? 'none' : '';
  }

  function toggleCam() {
    if (!localStream) return;
    camOn = !camOn;
    localStream.getVideoTracks().forEach(t => t.enabled = camOn);
    const btn = document.getElementById('camBtn');
    const icon = document.getElementById('camIcon');
    btn.className = 'ctrl-btn ' + (camOn ? 'active' : 'muted');
    icon.className = 'fas fa-video' + (camOn ? '' : '-slash');
  }

  async function toggleScreen() {
    try {
      const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
      document.getElementById('localVideo').srcObject = screenStream;
      screenStream.getVideoTracks()[0].onended = () => { if (localStream) document.getElementById('localVideo').srcObject = localStream; };
    } catch (e) { /* cancelled */ }
  }

  async function leaveMeeting() {
    if (!confirm('Leave the meeting?')) return;
    if (meetingId && token) {
      try { await fetch(`/api/v1/video-meetings/${meetingId}/end`, { method: 'PATCH', headers: { Authorization: `Bearer ${token}` } }); } catch (e) { /* */ }
    }
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    window.location.href = 'schedule.html';
  }

  function switchSideTab(tab, btn) {
    document.querySelectorAll('.sidebar-tab').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    const pPanel = document.getElementById('participantsPanel');
    const cPanel = document.getElementById('chatPanel');
    pPanel.style.display = tab === 'participants' ? '' : 'none';
    if (cPanel) { cPanel.style.display = tab === 'chat' ? 'flex' : 'none'; cPanel.style.flexDirection = 'column'; }
  }

  function sendMeetingChat() {
    const input = document.getElementById('meetingChatInput');
    const msg = input.value.trim();
    if (!msg) return;
    const area = document.getElementById('meetingChatArea');
    const div = document.createElement('div');
    div.className = 'chat-msg';
    div.innerHTML = `<div class="chat-avatar">Y</div><div class="chat-bubble"><div class="chat-user">You</div><div style="color:#c9d1d9">${msg}</div></div>`;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
    input.value = '';
  }

  // Duration timer
  setInterval(() => {
    const secs = Math.floor((Date.now() - startTime) / 1000);
    const h = String(Math.floor(secs / 3600)).padStart(2, '0');
    const m = String(Math.floor((secs % 3600) / 60)).padStart(2, '0');
    const s = String(secs % 60).padStart(2, '0');
    document.getElementById('meetingTimer').textContent = `${h}:${m}:${s}`;
  }, 1000);

  // Init
  loadMeeting();
  initMedia();
</script>
<script src="../../assets/js/navbar.js"></script>
  <script src="../../assets/js/meetings.js"></script>
</body>
</html>
