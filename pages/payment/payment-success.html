<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Payment Successful – Globex Sky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../../assets/css/main.css"/>
  <link rel="stylesheet" href="../../assets/css/payment.css"/>
  <link rel="stylesheet" href="../../assets/css/responsive.css" />
  <link rel="stylesheet" href="../../assets/css/mobile.css" />
</head>
<body>
<div id="navbar-placeholder"></div>

<main class="result-page">
  <div class="result-card">
    <div class="result-icon success">
      <i class="fas fa-check-circle"></i>
    </div>
    <h1 class="result-title">Payment Successful!</h1>
    <p class="result-subtitle">
      Thank you for your purchase. Your payment has been confirmed and your order is being processed.
    </p>

    <div class="result-ref">
      <div style="font-size:.75rem;color:#64748b;font-family:'Inter',sans-serif;margin-bottom:4px;font-weight:500">Transaction Reference</div>
      <span id="payment-ref">—</span>
    </div>

    <div style="display:flex;justify-content:space-between;margin-bottom:20px;font-size:.85rem;color:#374151;background:#f8faff;padding:14px 18px;border-radius:10px;gap:16px;flex-wrap:wrap">
      <div>
        <div style="color:#64748b;font-size:.78rem;margin-bottom:2px">Order ID</div>
        <div style="font-weight:600;font-family:monospace" id="payment-order-id">—</div>
      </div>
      <div>
        <div style="color:#64748b;font-size:.78rem;margin-bottom:2px">Date</div>
        <div style="font-weight:600" id="payment-date">—</div>
      </div>
      <div>
        <div style="color:#64748b;font-size:.78rem;margin-bottom:2px">Status</div>
        <div><span class="badge badge-success">Paid</span></div>
      </div>
    </div>

    <div class="result-actions">
      <a href="../account/orders.html" class="btn-result-primary" data-order-link>
        <i class="fas fa-box"></i> View Order
      </a>
      <a href="history.html" class="btn-result-secondary">
        <i class="fas fa-history"></i> Payment History
      </a>
      <a href="../../index.html" class="btn-result-secondary">
        <i class="fas fa-home"></i> Home
      </a>
    </div>

    <p style="margin-top:20px;font-size:.78rem;color:#94a3b8">
      A confirmation email has been sent to your registered email address.
    </p>
  </div>
</main>

<script src="../../assets/js/navbar.js" type="module"></script>
<script src="../../assets/js/payment.js" type="module"></script>
</body>
</html>
