<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>RFQ Marketplace – Globex Sky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../../assets/css/main.css"/>
  <link rel="stylesheet" href="../../assets/css/responsive.css"/>
  <link rel="stylesheet" href="../../assets/css/mobile.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#f0f2f8;color:#1a1a2e}

    /* Header */
    .page-header{background:linear-gradient(135deg,#0A0E27 0%,#0052CC 100%);color:#fff;padding:32px 24px}
    .header-inner{max-width:1200px;margin:0 auto}
    .header-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .logo{font-family:'Poppins',sans-serif;font-weight:700;font-size:1.4rem;color:#fff;text-decoration:none;display:flex;align-items:center;gap:8px}
    .logo img{height:36px}
    .nav-links{display:flex;gap:16px;align-items:center}
    .nav-links a{color:rgba(255,255,255,.8);text-decoration:none;font-size:.88rem;transition:color .2s}
    .nav-links a:hover{color:#fff}
    .hero-title{font-family:'Poppins',sans-serif;font-size:2rem;font-weight:700;margin-bottom:8px}
    .hero-subtitle{font-size:1rem;color:rgba(255,255,255,.8);max-width:600px}

    /* Container */
    .container{max-width:1200px;margin:0 auto;padding:24px}

    /* Filters */
    .filters-bar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:24px;background:#fff;padding:16px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .filter-group{display:flex;flex-direction:column;gap:4px}
    .filter-label{font-size:.75rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
    .filter-control{padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:.85rem;font-family:'Inter',sans-serif;min-width:160px}
    .filter-control:focus{outline:none;border-color:#0052CC}
    .btn{padding:8px 16px;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:6px}
    .btn-primary{background:#0052CC;color:#fff}
    .btn-primary:hover{background:#003d99}
    .btn-secondary{background:#f1f5f9;color:#374151;border:1px solid #e2e8f0}
    .btn-secondary:hover{background:#e2e8f0}

    /* RFQ Grid */
    .rfq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
    .rfq-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid #e2e8f0;transition:transform .2s,box-shadow .2s}
    .rfq-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
    .rfq-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    .rfq-title{font-family:'Poppins',sans-serif;font-size:1rem;font-weight:600;color:#0a0e27;margin-bottom:4px;line-height:1.3}
    .rfq-desc{font-size:.82rem;color:#64748b;line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .rfq-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
    .meta-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:.75rem;font-weight:600;background:#f1f5f9;color:#374151}
    .meta-tag i{font-size:.7rem}
    .urgency-low{background:#d1fae5;color:#059669}
    .urgency-medium{background:#fef3c7;color:#92400e}
    .urgency-high{background:#ffedd5;color:#ea580c}
    .urgency-urgent{background:#fee2e2;color:#dc2626}
    .rfq-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid #f1f5f9}
    .rfq-stats{display:flex;gap:12px;font-size:.78rem;color:#64748b}
    .rfq-stats span{display:flex;align-items:center;gap:4px}
    .rfq-budget{font-family:'Poppins',sans-serif;font-weight:600;color:#0052CC;font-size:.95rem}

    /* Pagination */
    .pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:32px}
    .page-btn{padding:8px 14px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-size:.85rem;font-family:'Inter',sans-serif;transition:all .2s}
    .page-btn:hover,.page-btn.active{background:#0052CC;color:#fff;border-color:#0052CC}
    .page-btn:disabled{opacity:.4;cursor:default}

    /* Empty State */
    .empty-state{text-align:center;padding:60px 20px;color:#64748b}
    .empty-state i{font-size:3rem;margin-bottom:16px;color:#cbd5e1}
    .empty-state h3{font-family:'Poppins',sans-serif;font-size:1.2rem;color:#374151;margin-bottom:8px}

    /* Loading */
    .loading{text-align:center;padding:40px;color:#64748b}
    .loading i{font-size:2rem;margin-bottom:12px}

    /* Footer */
    .site-footer{background:#0A0E27;color:rgba(255,255,255,.7);padding:32px 24px;text-align:center;font-size:.82rem;margin-top:40px}
    .site-footer a{color:#00C9A7;text-decoration:none}

    @media(max-width:768px){
      .rfq-grid{grid-template-columns:1fr}
      .hero-title{font-size:1.4rem}
      .filters-bar{flex-direction:column}
      .filter-control{width:100%}
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="page-header">
    <div class="header-inner">
      <nav class="header-nav">
        <a href="../../index.html" class="logo">
          <img src="../../assets/images/logo.png" alt="Globex Sky"/>
        </a>
        <div class="nav-links">
          <a href="../rfq/index.html">My RFQs</a>
          <a href="../rfq/create.html">Submit RFQ</a>
          <a href="../auth/login.html"><i class="fas fa-user"></i> Login</a>
          <a href="../auth/register.html" class="btn btn-primary" style="color:#fff">Register</a>
        </div>
      </nav>
      <h1 class="hero-title">RFQ Marketplace</h1>
      <p class="hero-subtitle">Browse open buying requests from verified buyers worldwide. Find opportunities and submit your best quotation.</p>
    </div>
  </header>

  <!-- Main Content -->
  <div class="container">

    <!-- Filters -->
    <div class="filters-bar">
      <div class="filter-group">
        <span class="filter-label">Category</span>
        <select class="filter-control" id="filterCategory">
          <option value="">All Categories</option>
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label">Urgency</span>
        <select class="filter-control" id="filterUrgency">
          <option value="">All</option>
          <option value="low">🟢 Low</option>
          <option value="medium">🟡 Medium</option>
          <option value="high">🟠 High</option>
          <option value="urgent">🔴 Urgent</option>
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label">Budget</span>
        <select class="filter-control" id="filterBudget">
          <option value="">Any Budget</option>
          <option value="under_1000">Under $1,000</option>
          <option value="1000_5000">$1,000 – $5,000</option>
          <option value="5000_25000">$5,000 – $25,000</option>
          <option value="25000_plus">$25,000+</option>
        </select>
      </div>
      <div class="filter-group" style="align-self:flex-end">
        <button class="btn btn-primary" onclick="applyFilters()"><i class="fas fa-search"></i> Search</button>
      </div>
      <div class="filter-group" style="align-self:flex-end">
        <button class="btn btn-secondary" onclick="resetFilters()"><i class="fas fa-times"></i> Reset</button>
      </div>
    </div>

    <!-- RFQ Listings -->
    <div id="rfqGrid" class="rfq-grid">
      <div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading marketplace…</p></div>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination" style="display:none"></div>

  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <p>&copy; 2024 <a href="../../index.html">Globex Sky</a>. All rights reserved.</p>
  </footer>

<script>
const API_BASE = '/api/v1/rfq-matching/marketplace';
let currentPage = 1;
const PAGE_SIZE = 12;

// ─── Helpers ─────────────────────────────────────────────────────────────────
function getHeaders() {
  const token = localStorage.getItem('gsky_token') || localStorage.getItem('token');
  return { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) };
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function urgencyClass(u) {
  return `meta-tag urgency-${u || 'medium'}`;
}

function urgencyIcon(u) {
  const map = { low: '🟢', medium: '🟡', high: '🟠', urgent: '🔴' };
  return map[u] || '🟡';
}

// ─── Load Categories ─────────────────────────────────────────────────────────
async function loadCategories() {
  try {
    const res = await fetch('/api/v1/categories', { headers: getHeaders() });
    const json = await res.json();
    const sel = document.getElementById('filterCategory');
    (json.data || []).forEach((c) => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name;
      sel.appendChild(opt);
    });
  } catch { /* categories optional */ }
}

// ─── Load Marketplace ────────────────────────────────────────────────────────
async function loadMarketplace(page = 1) {
  const grid = document.getElementById('rfqGrid');
  grid.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading marketplace…</p></div>';

  const params = new URLSearchParams({ page, limit: PAGE_SIZE });
  const category = document.getElementById('filterCategory').value;
  const urgency = document.getElementById('filterUrgency').value;
  if (category) params.set('category_id', category);
  if (urgency) params.set('urgency', urgency);

  try {
    const res = await fetch(`${API_BASE}?${params}`, { headers: getHeaders() });
    const json = await res.json();
    if (!json.success) throw new Error(json.error);

    const items = json.data || [];
    if (items.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <i class="fas fa-search"></i>
          <h3>No RFQs Found</h3>
          <p>There are no open buying requests matching your filters. Try adjusting your search or check back later.</p>
        </div>`;
      document.getElementById('pagination').style.display = 'none';
      return;
    }

    grid.innerHTML = items.map((item) => {
      const rfq = item.rfq || {};
      return `
        <div class="rfq-card">
          <div class="rfq-card-header">
            <div>
              <div class="rfq-title">${escapeHtml(rfq.product_name || rfq.title || 'Untitled RFQ')}</div>
            </div>
            <span class="${urgencyClass(item.urgency)}">${urgencyIcon(item.urgency)} ${(item.urgency || 'medium').toUpperCase()}</span>
          </div>
          <p class="rfq-desc">${escapeHtml(rfq.description || 'No description provided.')}</p>
          <div class="rfq-meta">
            ${rfq.quantity ? `<span class="meta-tag"><i class="fas fa-cubes"></i> Qty: ${rfq.quantity} ${rfq.unit || ''}</span>` : ''}
            ${item.budget_range ? `<span class="meta-tag"><i class="fas fa-dollar-sign"></i> ${escapeHtml(item.budget_range)}</span>` : ''}
            ${(item.tags || []).map((t) => `<span class="meta-tag"><i class="fas fa-tag"></i> ${escapeHtml(t)}</span>`).join('')}
          </div>
          <div class="rfq-footer">
            <div class="rfq-stats">
              <span><i class="fas fa-eye"></i> ${item.views_count || 0} views</span>
              <span><i class="fas fa-comment-dots"></i> ${item.quotes_count || 0} quotes</span>
              <span><i class="fas fa-clock"></i> ${item.expires_at ? formatDate(item.expires_at) : 'No expiry'}</span>
            </div>
            ${rfq.target_price ? `<span class="rfq-budget">${rfq.currency || 'USD'} ${Number(rfq.target_price).toLocaleString()}</span>` : ''}
          </div>
        </div>`;
    }).join('');

    currentPage = page;
    renderPagination(json.total || 0, page);
  } catch (err) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <i class="fas fa-exclamation-triangle"></i>
        <h3>Error Loading Marketplace</h3>
        <p>${escapeHtml(err.message)}</p>
      </div>`;
  }
}

// ─── Pagination ──────────────────────────────────────────────────────────────
function renderPagination(total, page) {
  const pagEl = document.getElementById('pagination');
  const totalPages = Math.ceil(total / PAGE_SIZE);
  if (totalPages <= 1) { pagEl.style.display = 'none'; return; }

  pagEl.style.display = 'flex';
  let html = `<button class="page-btn" onclick="loadMarketplace(${page - 1})" ${page <= 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>`;

  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
      html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="loadMarketplace(${i})">${i}</button>`;
    } else if (i === page - 3 || i === page + 3) {
      html += '<span style="padding:0 6px">…</span>';
    }
  }

  html += `<button class="page-btn" onclick="loadMarketplace(${page + 1})" ${page >= totalPages ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;
  pagEl.innerHTML = html;
}

// ─── Filters ─────────────────────────────────────────────────────────────────
function applyFilters() { loadMarketplace(1); }
function resetFilters() {
  document.getElementById('filterCategory').value = '';
  document.getElementById('filterUrgency').value = '';
  document.getElementById('filterBudget').value = '';
  loadMarketplace(1);
}

// ─── Security ────────────────────────────────────────────────────────────────
function escapeHtml(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

// ─── Init ────────────────────────────────────────────────────────────────────
loadCategories();
loadMarketplace();
</script>
</body>
</html>
