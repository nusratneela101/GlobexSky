<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shipping Carriers | Globex Sky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <link rel="stylesheet" href="../../assets/css/main.css"/>
  <link rel="stylesheet" href="../../assets/css/responsive.css"/>
  <link rel="stylesheet" href="../../assets/css/mobile.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;color:#1a1a2e;background:#f4f6fa}
    .site-header{background:#fff;box-shadow:0 2px 20px rgba(0,82,204,.08);position:sticky;top:0;z-index:1000}
    .nav-container{display:flex;align-items:center;justify-content:space-between;max-width:1400px;margin:0 auto;padding:14px 24px}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-controls{display:flex;align-items:center;gap:10px}
    .btn-nav{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;text-decoration:none;font-size:.85rem;font-weight:500;transition:all .2s}
    .btn-login{color:#0052CC;border:1.5px solid #0052CC}.btn-login:hover{background:#0052CC;color:#fff}
    .btn-register{background:#0052CC;color:#fff}.btn-register:hover{background:#003d99}
    .container{max-width:1200px;margin:0 auto;padding:0 24px}
    .page-hero{background:linear-gradient(135deg,#0052CC 0%,#0A0E27 100%);padding:64px 24px 48px;text-align:center;color:#fff}
    .page-hero h1{font-family:'Poppins',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;margin-bottom:12px}
    .page-hero p{font-size:.97rem;opacity:.8;max-width:520px;margin:0 auto;line-height:1.7}
    .content-section{padding:48px 24px}
    .carriers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
    .form-control{padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.9rem;font-family:'Inter',sans-serif;color:#1a1a2e;outline:none;transition:border-color .2s;background:#fff}
    .form-control:focus{border-color:#0052CC;box-shadow:0 0 0 3px rgba(0,82,204,.1)}
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:50px;font-size:.75rem;font-weight:600}
    .site-footer{background:#0A0E27;color:#fff;padding:32px 24px}
    .footer-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
    .footer-copyright{color:rgba(255,255,255,.5);font-size:.8rem}
    .footer-links-row{display:flex;gap:20px;list-style:none}
    .footer-links-row a{color:rgba(255,255,255,.6);font-size:.82rem;text-decoration:none}.footer-links-row a:hover{color:#00C9A7}
    .nav-tabs{display:flex;gap:8px;margin-bottom:24px;border-bottom:2px solid #e2e8f0;padding-bottom:0;flex-wrap:wrap}
    .nav-tab{padding:10px 20px;border-radius:8px 8px 0 0;font-size:.88rem;font-weight:500;color:#64748b;text-decoration:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
    .nav-tab.active,.nav-tab:hover{color:#0052CC;border-bottom-color:#0052CC;background:#f0f4ff}
  </style>
</head>
<body>
<header class="site-header">
  <nav>
    <div class="nav-container">
      <a href="../../index.html" class="nav-logo"><img src="../../assets/images/logo.png" alt="Globex Sky Logo" width="160" height="50" style="object-fit:contain"></a>
      <div class="nav-controls">
        <a href="../../pages/auth/login.html" class="btn-nav btn-login"><i class="fas fa-sign-in-alt"></i> Login</a>
        <a href="../../pages/auth/register.html" class="btn-nav btn-register"><i class="fas fa-user-plus"></i> Register</a>
      </div>
    </div>
  </nav>
</header>

<div class="page-hero">
  <h1><i class="fas fa-truck"></i> Shipping Carriers</h1>
  <p>Browse our network of trusted global shipping carriers.</p>
</div>

<div class="content-section">
  <div class="container">

    <!-- Quick nav -->
    <div class="nav-tabs">
      <a href="index.html" class="nav-tab"><i class="fas fa-home"></i> Overview</a>
      <a href="tracking.html" class="nav-tab"><i class="fas fa-map-marker-alt"></i> Track</a>
      <a href="rates.html" class="nav-tab"><i class="fas fa-calculator"></i> Rates</a>
      <a href="carriers.html" class="nav-tab active"><i class="fas fa-truck"></i> Carriers</a>
      <a href="history.html" class="nav-tab"><i class="fas fa-history"></i> History</a>
    </div>

    <!-- Filters -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap">
      <div style="font-family:'Poppins',sans-serif;font-weight:600;color:#0a0e27;font-size:1rem">Filter by Region:</div>
      <select class="form-control" id="regionFilter" style="width:auto;min-width:180px">
        <option value="">All Regions</option>
        <option value="worldwide">Worldwide</option>
        <option value="china">China</option>
        <option value="asia">Asia</option>
        <option value="middle east">Middle East</option>
        <option value="africa">Africa</option>
        <option value="usa">USA</option>
      </select>
    </div>

    <!-- Carrier Cards Grid -->
    <div class="carriers-grid" id="carriersGrid">
      <div style="text-align:center;padding:48px;grid-column:1/-1"><i class="fas fa-circle-notch fa-spin" style="font-size:2rem;color:#0052CC"></i><div style="margin-top:12px;color:#64748b">Loading carriers…</div></div>
    </div>

  </div>
</div>

<footer class="site-footer">
  <div class="footer-inner">
    <p class="footer-copyright">&copy; <script>document.write(new Date().getFullYear())</script> Globex International Trade Co., Ltd. All rights reserved.</p>
    <ul class="footer-links-row">
      <li><a href="../../pages/privacy.html">Privacy</a></li>
      <li><a href="../../pages/terms.html">Terms</a></li>
      <li><a href="../../pages/contact.html">Contact</a></li>
    </ul>
  </div>
</footer>
<script src="../../assets/js/main.js" defer></script>
<script src="../../assets/js/config.js"></script>
<script src="../../assets/js/api-service.js"></script>
<script src="../../assets/js/shipping.js"></script>
</body>
</html>
