<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Request for Quotation – GlobexSky</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../../assets/css/main.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;color:#1a1a2e;background:#f4f6fa}
.site-header{background:#fff;box-shadow:0 2px 20px rgba(0,82,204,.08);position:sticky;top:0;z-index:1000}
.navbar{padding:0}.nav-container{display:flex;align-items:center;gap:16px;max-width:1400px;margin:0 auto;padding:12px 24px}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-text{font-family:'Poppins',sans-serif;font-size:1.4rem;font-weight:700;color:#0a0e27}
.logo-accent{color:#0052CC}
.nav-controls{display:flex;align-items:center;gap:10px;margin-left:auto}
.btn-nav{padding:8px 16px;border-radius:8px;text-decoration:none;font-size:.85rem;font-weight:500}
.btn-login{color:#0052CC;border:1.5px solid #0052CC}.btn-register{background:#0052CC;color:#fff}
.hero{background:linear-gradient(135deg,#0052CC 0%,#00C9A7 100%);padding:56px 24px;text-align:center}
.hero-title{font-family:'Poppins',sans-serif;font-size:clamp(1.8rem,4vw,2.6rem);font-weight:700;color:#fff;margin-bottom:10px}
.hero-sub{color:rgba(255,255,255,.8);font-size:1rem}
.container{max-width:700px;margin:0 auto;padding:0 24px}
.section{padding:48px 24px}
.breadcrumb{display:flex;gap:6px;align-items:center;font-size:.82rem;color:#64748b;margin-bottom:24px;flex-wrap:wrap}
.breadcrumb a{color:#0052CC;text-decoration:none}
.card{background:#fff;border-radius:14px;padding:32px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.card-title{font-family:'Poppins',sans-serif;font-size:1.1rem;font-weight:700;color:#0a0e27;margin-bottom:22px;display:flex;align-items:center;gap:8px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:.85rem;font-weight:500;color:#374151;margin-bottom:6px}
.form-control{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.9rem;font-family:'Inter',sans-serif;color:#1a1a2e;background:#fff;transition:border-color .2s}
.form-control:focus{outline:none;border-color:#0052CC;box-shadow:0 0 0 3px rgba(0,82,204,.1)}
textarea.form-control{min-height:120px;resize:vertical}
.upload-zone{border:2px dashed #cbd5e1;border-radius:10px;padding:24px;text-align:center;cursor:pointer;background:#fafbff;transition:all .2s}
.upload-zone:hover{border-color:#0052CC}
.upload-zone i{font-size:1.8rem;color:#0052CC;margin-bottom:8px;display:block}
.upload-zone input{display:none}
.btn{padding:12px 28px;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:'Poppins',sans-serif;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:#0052CC;color:#fff}.btn-primary:hover{background:#003d99}
.site-footer{background:#0a0e27;padding:24px 0}
.footer-inner{max-width:1400px;margin:0 auto;padding:0 24px}
.footer-copyright{color:rgba(255,255,255,.6);font-size:.85rem;text-align:center}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="site-header">
  <nav class="navbar">
    <div class="nav-container">
      <a href="../../index.html" class="nav-logo">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="17" stroke="#0052CC" stroke-width="2" fill="none"/><ellipse cx="18" cy="18" rx="8" ry="17" stroke="#0052CC" stroke-width="1.5" fill="none"/><line x1="1" y1="18" x2="35" y2="18" stroke="#0052CC" stroke-width="1.5"/><path d="M22 10 L30 14 L26 16 L28 24 L20 20 L22 10Z" fill="#FF6B35"/></svg>
        <span class="logo-text">Globex<span class="logo-accent">Sky</span></span>
      </a>
      <div class="nav-controls">
        <a href="../auth/login.html" class="btn-nav btn-login">Login</a>
        <a href="../auth/register.html" class="btn-nav btn-register">Register</a>
      </div>
    </div>
  </nav>
</header>

<div class="hero">
  <h1 class="hero-title"><i class="fas fa-file-alt"></i> Request for Quotation</h1>
  <p class="hero-sub">Submit your product requirements and receive quotes from verified global suppliers.</p>
</div>

<section class="section">
  <div class="container">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="../../index.html">Home</a><span>/</span>
      <a href="index.html">Sourcing</a><span>/</span>
      <span>Request for Quotation</span>
    </nav>
    <div class="card">
      <h3 class="card-title"><i class="fas fa-file-contract" style="color:#0052CC"></i> Submit RFQ</h3>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="product-name">Product Name *</label>
          <input type="text" class="form-control" id="product-name" placeholder="e.g. Wireless Earbuds" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="quantity">Quantity Required *</label>
          <input type="number" class="form-control" id="quantity" placeholder="e.g. 500" min="1" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="target-price">Target Price per Unit ($)</label>
          <input type="number" class="form-control" id="target-price" placeholder="e.g. 12.00" min="0.01" step="0.01">
        </div>
        <div class="form-group">
          <label class="form-label" for="delivery-date">Required Delivery Date</label>
          <input type="date" class="form-control" id="delivery-date">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="notes">Additional Notes</label>
        <textarea class="form-control" id="notes" placeholder="Describe product specifications, materials, packaging requirements, certifications needed, etc."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Upload Reference File (optional)</label>
        <label class="upload-zone" for="rfq-file">
          <input type="file" id="rfq-file" accept=".pdf,.doc,.docx,.jpg,.png" onchange="document.getElementById('file-name').textContent = this.files[0]?.name || 'No file chosen'">
          <i class="fas fa-cloud-upload-alt"></i>
          <p style="font-size:.85rem;color:#64748b">Click to upload or drag & drop</p>
          <p style="font-size:.75rem;color:#94a3b8" id="file-name">PDF, DOC, JPG, PNG (max 10 MB)</p>
        </label>
      </div>
      <button class="btn btn-primary" onclick="submitRFQ()"><i class="fas fa-paper-plane"></i> Submit RFQ</button>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="footer-inner">
    <p class="footer-copyright">&copy; <span id="yr"></span> GlobexSky. All rights reserved.</p>
  </div>
</footer>
<script>
function submitRFQ() {
  const name = document.getElementById('product-name').value.trim();
  const qty = document.getElementById('quantity').value;
  if (!name || !qty) { alert('Please fill in required fields.'); return; }
  const btn = event.target; btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting…';
  setTimeout(() => {
    document.querySelector('.card').innerHTML = `<div style="text-align:center;padding:40px"><div style="width:70px;height:70px;background:#d1fae5;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.8rem;color:#059669"><i class="fas fa-check"></i></div><h3 style="font-family:'Poppins',sans-serif;font-weight:700;color:#0a0e27;margin-bottom:8px">RFQ Submitted!</h3><p style="color:#64748b;max-width:380px;margin:0 auto">Your request has been submitted. Verified suppliers will respond within 48 hours.</p></div>`;
  }, 1400);
}
document.getElementById('yr').textContent = new Date().getFullYear();
</script>
</body>
</html>
