<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Top-Rated Suppliers – Globex Sky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <link rel="stylesheet" href="../../assets/css/main.css"/>
  <link rel="stylesheet" href="../../assets/css/supplier-scorecard.css"/>
  <link rel="stylesheet" href="../../assets/css/responsive.css" />
  <link rel="stylesheet" href="../../assets/css/mobile.css" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;color:#1a1a2e;background:#f4f6fa}
    .site-header{background:#fff;box-shadow:0 2px 20px rgba(0,82,204,.08);position:sticky;top:0;z-index:1000}
    .nav-container{display:flex;align-items:center;gap:16px;max-width:1400px;margin:0 auto;padding:12px 24px}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-subtitle{font-size:.72rem;color:#64748b;margin-left:2px}
    .nav-controls{display:flex;align-items:center;gap:10px;margin-left:auto}
    .page-hero{background:linear-gradient(135deg,#0052CC 0%,#0A0E27 100%);color:#fff;padding:48px 24px;text-align:center}
    .page-hero h1{font-family:'Poppins',sans-serif;font-size:2rem;font-weight:800;margin-bottom:8px}
    .page-hero p{font-size:1rem;opacity:.85;max-width:560px;margin:0 auto}
    .page-content{max-width:1200px;margin:0 auto;padding:32px 24px}
    /* Filter bar */
    .filter-bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:28px}
    .filter-bar label{font-weight:500;font-size:.88rem;color:#374151}
    .filter-bar select,.filter-bar input{padding:8px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.88rem;color:#374151;background:#fff;outline:none;transition:border .2s}
    .filter-bar select:focus,.filter-bar input:focus{border-color:#0052CC}
    .btn-primary{padding:8px 20px;background:#0052CC;color:#fff;border:none;border-radius:8px;font-weight:600;font-size:.88rem;cursor:pointer;transition:background .2s}
    .btn-primary:hover{background:#0041a3}
    /* Leaderboard */
    .leaderboard-table{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);overflow:hidden}
    .leaderboard-header{display:grid;grid-template-columns:50px 2fr 100px 100px 100px 100px 100px 120px;gap:8px;padding:14px 20px;background:#f8faff;border-bottom:1.5px solid #e2e8f0;font-size:.8rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.04em}
    .leaderboard-row{display:grid;grid-template-columns:50px 2fr 100px 100px 100px 100px 100px 120px;gap:8px;padding:14px 20px;border-bottom:1px solid #f1f5f9;align-items:center;transition:background .15s}
    .leaderboard-row:last-child{border-bottom:none}
    .leaderboard-row:hover{background:#f8faff}
    .rank{font-family:'Poppins',sans-serif;font-weight:700;font-size:1rem;text-align:center}
    .rank-1{color:#f59e0b}.rank-2{color:#94a3b8}.rank-3{color:#c97432}
    .rank-medal{font-size:1.1rem}
    .supplier-info{display:flex;align-items:center;gap:10px}
    .supplier-avatar{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#0052CC,#00C9A7);color:#fff;font-weight:700;font-size:.85rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .supplier-name{font-weight:600;font-size:.9rem;color:#0a0e27}
    .supplier-country{font-size:.75rem;color:#64748b}
    .score-cell{text-align:center}
    .score-val{font-family:'Poppins',sans-serif;font-weight:700;font-size:.95rem;color:#0052CC}
    .mini-bar{height:4px;background:#e2e8f0;border-radius:50px;overflow:hidden;margin-top:4px}
    .mini-bar-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,#0052CC,#00C9A7)}
    .tier-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:50px;font-size:.75rem;font-weight:700}
    .tier-platinum{background:linear-gradient(135deg,#818cf8,#c084fc);color:#fff}
    .tier-gold{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#fff}
    .tier-silver{background:linear-gradient(135deg,#94a3b8,#cbd5e1);color:#fff}
    .tier-bronze{background:linear-gradient(135deg,#c97432,#d4956e);color:#fff}
    .tier-none{background:#f1f5f9;color:#64748b}
    .badge-list{display:flex;gap:4px;flex-wrap:wrap}
    .mini-badge{background:#f0f4ff;color:#0052CC;border-radius:6px;padding:2px 8px;font-size:.7rem;font-weight:600}
    .view-btn{padding:4px 14px;background:#f0f4ff;color:#0052CC;border:none;border-radius:6px;font-size:.8rem;font-weight:600;cursor:pointer;text-decoration:none}
    .view-btn:hover{background:#dce8ff}
    /* Top 3 cards */
    .top3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:32px}
    .top3-card{background:#fff;border-radius:16px;padding:24px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06);border-top:4px solid #e2e8f0;position:relative}
    .top3-card.rank-1{border-top-color:#f59e0b}
    .top3-card.rank-2{border-top-color:#94a3b8}
    .top3-card.rank-3{border-top-color:#c97432}
    .crown-icon{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:2rem}
    .top3-avatar{width:72px;height:72px;border-radius:16px;background:linear-gradient(135deg,#0052CC,#00C9A7);color:#fff;font-weight:800;font-size:1.5rem;display:flex;align-items:center;justify-content:center;margin:16px auto 12px}
    .top3-name{font-family:'Poppins',sans-serif;font-weight:700;font-size:1rem;color:#0a0e27;margin-bottom:4px}
    .top3-country{font-size:.8rem;color:#64748b;margin-bottom:12px}
    .top3-score{font-family:'Poppins',sans-serif;font-size:2.2rem;font-weight:800;color:#0052CC}
    .top3-score-label{font-size:.75rem;color:#64748b}
    .empty-state{text-align:center;padding:48px 24px;color:#94a3b8}
    .empty-state i{font-size:2.5rem;margin-bottom:12px;display:block}
    .section-title{font-family:'Poppins',sans-serif;font-size:1.1rem;font-weight:700;color:#0a0e27;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    @media(max-width:900px){
      .top3{grid-template-columns:1fr}
      .leaderboard-header,.leaderboard-row{grid-template-columns:40px 1fr 80px 80px 100px}
      .col-delivery,.col-communication,.col-pricing{display:none}
    }
    @media(max-width:600px){.filter-bar{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>
<header class="site-header">
  <nav>
    <div class="nav-container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/images/logo.png" alt="Globex Sky Logo" width="180" height="56" style="object-fit:contain"/>
        <div><div class="nav-subtitle">Supplier Rankings</div></div>
      </a>
      <div class="nav-controls">
        <a href="scorecard.html" style="text-decoration:none;font-size:.88rem;color:#374151;font-weight:500">My Scorecard</a>
        <a href="../auth/login.html" class="btn-primary" style="text-decoration:none">Login</a>
      </div>
    </div>
  </nav>
</header>

<div class="page-hero">
  <h1><i class="fas fa-trophy" style="margin-right:10px;color:#f59e0b"></i>Top-Rated Suppliers</h1>
  <p>Discover the highest-performing suppliers on GlobexSky, ranked by verified buyer evaluations.</p>
</div>

<div class="page-content">
  <!-- Filter bar -->
  <div class="filter-bar">
    <label>Show top:</label>
    <select id="limitSelect">
      <option value="10">10</option>
      <option value="25">25</option>
      <option value="50">50</option>
    </select>
    <label>Min score:</label>
    <input type="number" id="minScore" min="0" max="100" value="0" style="width:80px"/>
    <button class="btn-primary" id="applyFilter"><i class="fas fa-filter"></i> Apply</button>
  </div>

  <!-- Top 3 podium -->
  <div class="section-title"><i class="fas fa-medal"></i> Top 3 Suppliers</div>
  <div class="top3" id="top3Container">
    <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div>
  </div>

  <!-- Full leaderboard -->
  <div class="section-title"><i class="fas fa-list-ol"></i> Full Leaderboard</div>
  <div class="leaderboard-table">
    <div class="leaderboard-header">
      <div>#</div>
      <div>Supplier</div>
      <div class="score-cell">Overall</div>
      <div class="score-cell col-delivery">Delivery</div>
      <div class="score-cell col-communication">Comm.</div>
      <div class="score-cell col-pricing">Pricing</div>
      <div>Tier</div>
      <div></div>
    </div>
    <div id="leaderboardBody">
      <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div>
    </div>
  </div>
</div>

<footer class="site-footer" style="background:#0a0e27;color:#94a3b8;padding:32px 24px;text-align:center;margin-top:48px">
  <p style="font-size:.88rem">&copy; 2024 GlobexSky. All rights reserved.</p>
</footer>

<script src="../../assets/js/supplier-scorecard.js"></script>
<script>
(function () {
  'use strict';

  function escHtml(s) {
    return typeof s === 'string' ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : String(s);
  }

  function getTier(score) {
    if (score >= 90) return 'platinum';
    if (score >= 80) return 'gold';
    if (score >= 65) return 'silver';
    if (score >= 50) return 'bronze';
    return 'none';
  }

  function tierPill(tier) {
    var labels = { platinum:'Platinum', gold:'Gold', silver:'Silver', bronze:'Bronze', none:'Unranked' };
    var icons  = { platinum:'fa-crown', gold:'fa-star', silver:'fa-award', bronze:'fa-medal', none:'fa-circle' };
    return '<span class="tier-pill tier-' + tier + '"><i class="fas ' + icons[tier] + '"></i> ' + (labels[tier] || tier) + '</span>';
  }

  function initials(name) {
    return (name || '?').split(' ').slice(0,2).map(function(w){return w[0];}).join('').toUpperCase();
  }

  function renderTop3(ranked) {
    var top3 = ranked.slice(0, 3);
    if (!top3.length) {
      document.getElementById('top3Container').innerHTML = '<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-users-slash"></i><p>No suppliers found.</p></div>';
      return;
    }
    var rankColors = ['#f59e0b','#94a3b8','#c97432'];
    var rankIcons  = ['🥇','🥈','🥉'];
    var html = '';
    top3.forEach(function(s, i) {
      var name = (s.suppliers && s.suppliers.company_name) || s.name || 'Supplier';
      var country = (s.suppliers && s.suppliers.country) || s.country || '';
      var score = Math.round(s.overall_score || SupplierScorecard.calculateOverall(s.scores || {}));
      html += '<div class="top3-card rank-' + (i+1) + '">'
        + '<div class="crown-icon">' + rankIcons[i] + '</div>'
        + '<div class="top3-avatar">' + escHtml(initials(name)) + '</div>'
        + '<div class="top3-name">' + escHtml(name) + '</div>'
        + '<div class="top3-country"><i class="fas fa-map-marker-alt" style="font-size:.7rem"></i> ' + escHtml(country) + '</div>'
        + '<div class="top3-score">' + score + '</div>'
        + '<div class="top3-score-label">Overall Score</div>'
        + '</div>';
    });
    document.getElementById('top3Container').innerHTML = html;
  }

  function renderLeaderboard(ranked) {
    if (!ranked.length) {
      document.getElementById('leaderboardBody').innerHTML = '<div class="empty-state"><i class="fas fa-users-slash"></i><p>No suppliers match the filter.</p></div>';
      return;
    }
    var html = '';
    ranked.forEach(function(s, i) {
      var rank = i + 1;
      var name = (s.suppliers && s.suppliers.company_name) || s.name || 'Supplier';
      var country = (s.suppliers && s.suppliers.country) || s.country || '';
      var overall   = Math.round(s.overall_score   || SupplierScorecard.calculateOverall(s.scores || {}));
      var delivery  = Math.round(s.delivery_score  || (s.scores && s.scores.delivery)  || 0);
      var comm      = Math.round(s.communication_score || (s.scores && s.scores.communication) || 0);
      var pricing   = Math.round(s.pricing_score   || (s.scores && s.scores.pricing)   || 0);
      var tier      = getTier(overall);
      var rankClass = rank <= 3 ? ' rank-' + rank : '';
      var rankCell  = rank <= 3
        ? '<div class="rank rank-' + rank + '"><span class="rank-medal">' + ['🥇','🥈','🥉'][rank-1] + '</span></div>'
        : '<div class="rank" style="color:#94a3b8">' + rank + '</div>';

      html += '<div class="leaderboard-row">'
        + rankCell
        + '<div class="supplier-info"><div class="supplier-avatar">' + escHtml(initials(name)) + '</div>'
        + '<div><div class="supplier-name">' + escHtml(name) + '</div>'
        + '<div class="supplier-country">' + escHtml(country) + '</div></div></div>'
        + '<div class="score-cell"><div class="score-val">' + overall + '</div>'
        + '<div class="mini-bar"><div class="mini-bar-fill" style="width:' + overall + '%"></div></div></div>'
        + '<div class="score-cell col-delivery"><div class="score-val">' + delivery + '</div></div>'
        + '<div class="score-cell col-communication"><div class="score-val">' + comm + '</div></div>'
        + '<div class="score-cell col-pricing"><div class="score-val">' + pricing + '</div></div>'
        + '<div>' + tierPill(tier) + '</div>'
        + '<div><a href="scorecard.html?id=' + escHtml(s.supplier_id || s.id || '') + '" class="view-btn">View</a></div>'
        + '</div>';
    });
    document.getElementById('leaderboardBody').innerHTML = html;
  }

  function loadData() {
    var limit    = parseInt(document.getElementById('limitSelect').value, 10) || 10;
    var minScore = parseInt(document.getElementById('minScore').value, 10) || 0;

    // Try backend API first, fall back to localStorage demo data
    fetch('/api/v1/suppliers/top-rated?limit=' + limit)
      .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
      .then(function(json) {
        var data = (json.data || []).filter(function(s) {
          return (s.overall_score || 0) >= minScore;
        });
        renderTop3(data);
        renderLeaderboard(data);
      })
      .catch(function() {
        // Fallback: use localStorage demo data
        var all = SupplierScorecard.getRankings()
          .filter(function(s) { return s.overall >= minScore; })
          .slice(0, limit);

        var mapped = all.map(function(s) {
          return {
            supplier_id: s.id,
            name: s.name,
            country: s.country,
            overall_score: s.overall,
            delivery_score: s.scores.delivery,
            communication_score: s.scores.communication,
            pricing_score: s.scores.pricing,
            scores: s.scores,
          };
        });
        renderTop3(mapped);
        renderLeaderboard(mapped);
      });
  }

  document.getElementById('applyFilter').addEventListener('click', loadData);
  loadData();
})();
</script>
<script src="../../assets/js/config.js"></script>
<script src="../../assets/js/api-service.js"></script>
<script src="../../assets/js/supplier.js"></script>
<script src="../../assets/js/navbar.js"></script>
<script src="../../assets/js/auth-guard.js"></script>
</body>
</html>
