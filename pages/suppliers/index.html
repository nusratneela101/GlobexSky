<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Supplier Directory | Globex Sky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <link rel="stylesheet" href="../../assets/css/main.css"/>
  <link rel="stylesheet" href="../../assets/css/responsive.css"/>
  <link rel="stylesheet" href="../../assets/css/mobile.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;color:#1a1a2e;background:#f4f6fa}
    .container{max-width:1280px;margin:0 auto;padding:0 24px}
    .page-hero{background:linear-gradient(135deg,#0052CC,#00C9A7);color:#fff;padding:60px 24px;text-align:center}
    .page-hero h1{font-family:'Poppins',sans-serif;font-size:2rem;font-weight:700;margin-bottom:10px}
    .page-hero p{font-size:1rem;opacity:.9;margin-bottom:24px}
    .search-bar{display:flex;gap:10px;max-width:600px;margin:0 auto}
    .search-bar input{flex:1;padding:12px 18px;border-radius:10px;border:none;font-size:.95rem;outline:none}
    .search-bar button{padding:12px 24px;background:#fff;color:#0052CC;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all .2s}
    .search-bar button:hover{background:#e8f0ff}
    .layout{display:grid;grid-template-columns:260px 1fr;gap:24px;padding:32px 0}
    @media(max-width:768px){.layout{grid-template-columns:1fr}}
    .sidebar{background:#fff;border-radius:16px;padding:20px;height:fit-content;box-shadow:0 2px 12px rgba(0,0,0,.06)}
    .sidebar h3{font-family:'Poppins',sans-serif;font-size:.95rem;font-weight:600;color:#0a0e27;margin-bottom:14px}
    .filter-group{margin-bottom:20px}
    .filter-group label{display:block;font-size:.85rem;font-weight:500;color:#374151;margin-bottom:6px}
    .filter-group select,.filter-group input[type="text"]{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.88rem}
    .filter-group input[type="checkbox"]{margin-right:8px}
    .btn-filter{width:100%;padding:10px;background:#0052CC;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:.9rem;transition:all .2s}
    .btn-filter:hover{background:#003d99}
    .results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .results-count{color:#64748b;font-size:.9rem}
    .suppliers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
    .supplier-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);cursor:pointer;transition:all .2s;border:2px solid transparent}
    .supplier-card:hover{border-color:#0052CC;transform:translateY(-2px)}
    .supplier-header{display:flex;align-items:center;gap:14px;margin-bottom:14px}
    .supplier-logo{width:52px;height:52px;border-radius:10px;overflow:hidden;flex-shrink:0}
    .supplier-logo img{width:100%;height:100%;object-fit:cover}
    .supplier-avatar{width:52px;height:52px;border-radius:10px;background:linear-gradient(135deg,#0052CC,#00C9A7);color:#fff;font-size:1.1rem;font-weight:700;display:flex;align-items:center;justify-content:center}
    .supplier-name{font-family:'Poppins',sans-serif;font-weight:600;color:#0a0e27;font-size:.95rem}
    .supplier-location{color:#64748b;font-size:.8rem;margin-top:3px}
    .supplier-location i{margin-right:4px;color:#94a3b8}
    .verified-badge{display:inline-flex;align-items:center;gap:4px;background:#d1fae5;color:#065f46;font-size:.72rem;font-weight:600;padding:2px 8px;border-radius:20px;margin-left:auto}
    .supplier-stats{display:flex;gap:12px;font-size:.82rem;color:#374151;margin-bottom:10px;flex-wrap:wrap}
    .supplier-desc{font-size:.82rem;color:#64748b;line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .tier-badge{padding:2px 8px;border-radius:12px;font-size:.72rem;font-weight:600}
    .supplier-actions{display:flex;gap:8px;margin-top:12px}
    .btn{padding:8px 16px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
    .btn-primary{background:#0052CC;color:#fff}.btn-primary:hover{background:#003d99}
    .btn-secondary{background:#f1f5f9;color:#374151}.btn-secondary:hover{background:#e2e8f0}
    .btn-sm{padding:6px 14px;font-size:.8rem}
    .loading-text,.empty-state{text-align:center;padding:40px;color:#64748b}
    .text-danger{color:#ef4444}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal-box{background:#fff;border-radius:16px;padding:28px;max-width:500px;width:90%;max-height:90vh;overflow-y:auto}
    .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .modal-header h3{font-family:'Poppins',sans-serif;font-weight:600}
    .modal-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:#64748b}
    .form-group{margin-bottom:14px}
    .form-label{display:block;font-size:.85rem;font-weight:500;color:#374151;margin-bottom:5px}
    .form-control{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.88rem}
    .form-control:focus{outline:none;border-color:#0052CC}
    .toast{display:none;position:fixed;bottom:24px;right:24px;background:#065f46;color:#fff;padding:12px 20px;border-radius:10px;font-size:.9rem;font-weight:500;z-index:3000;animation:slideUp .3s ease}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<header class="site-header">
  <nav class="nav-container container">
    <a href="../../index.html" class="nav-logo">
      <img src="../../assets/images/logo.svg" alt="Globex Sky" height="36" onerror="this.style.display='none'"/>
      <span style="font-family:'Poppins',sans-serif;font-weight:700;color:#0052CC;font-size:1.1rem">Globex Sky</span>
    </a>
    <div class="nav-controls">
      <a href="../../pages/auth/login.html" class="btn-nav btn-login">Login</a>
      <a href="../../pages/auth/register.html" class="btn-nav btn-register">Register</a>
    </div>
  </nav>
</header>

<section class="page-hero">
  <div class="container">
    <h1><i class="fas fa-industry"></i> Supplier Directory</h1>
    <p>Find verified global suppliers for your sourcing needs</p>
    <div class="search-bar">
      <input type="text" id="supplier-search" placeholder="Search suppliers by name, product…" onkeydown="if(event.key==='Enter')loadSupplierDirectory('suppliers-grid')"/>
      <button onclick="loadSupplierDirectory('suppliers-grid')"><i class="fas fa-search"></i> Search</button>
    </div>
  </div>
</section>

<main class="container">
  <div class="layout">
    <aside class="sidebar">
      <h3><i class="fas fa-filter"></i> Filters</h3>
      <div class="filter-group">
        <label for="filter-country">Country</label>
        <select id="filter-country">
          <option value="">All Countries</option>
          <option value="China">China</option>
          <option value="India">India</option>
          <option value="USA">USA</option>
          <option value="Germany">Germany</option>
          <option value="Japan">Japan</option>
          <option value="South Korea">South Korea</option>
          <option value="Bangladesh">Bangladesh</option>
          <option value="Turkey">Turkey</option>
          <option value="Vietnam">Vietnam</option>
          <option value="Indonesia">Indonesia</option>
        </select>
      </div>
      <div class="filter-group">
        <label>
          <input type="checkbox" id="filter-verified"/>
          Verified Suppliers Only
        </label>
      </div>
      <button class="btn-filter" onclick="loadSupplierDirectory('suppliers-grid')">
        <i class="fas fa-sliders-h"></i> Apply Filters
      </button>
    </aside>

    <div>
      <div class="results-header">
        <p class="results-count">Showing <strong id="supplier-count">—</strong> suppliers</p>
        <a href="../supplier/register.html" class="btn btn-primary btn-sm">
          <i class="fas fa-plus"></i> Become a Supplier
        </a>
      </div>
      <div class="suppliers-grid" id="suppliers-grid">
        <p class="loading-text"><i class="fas fa-spinner fa-spin"></i> Loading suppliers…</p>
      </div>
    </div>
  </div>
</main>

<!-- Contact Supplier Modal -->
<div class="modal-overlay" id="contactModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3><i class="fas fa-envelope"></i> Contact <span id="contactSupplierName"></span></h3>
      <button class="modal-close" onclick="closeContactModal()">&times;</button>
    </div>
    <form id="contactForm" onsubmit="event.preventDefault();submitContactSupplier('contactForm')">
      <input type="hidden" id="contactSupplierId"/>
      <div class="form-group">
        <label class="form-label">Your Name</label>
        <input type="text" class="form-control" name="buyer_name" placeholder="Your full name"/>
      </div>
      <div class="form-group">
        <label class="form-label">Your Email</label>
        <input type="email" class="form-control" name="buyer_email" placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Subject</label>
        <input type="text" class="form-control" name="subject" placeholder="Product inquiry" value="Product Inquiry"/>
      </div>
      <div class="form-group">
        <label class="form-label">Message <span style="color:#ef4444">*</span></label>
        <textarea class="form-control" name="message" rows="4" placeholder="Describe your inquiry, product needs, quantity…" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">
        <i class="fas fa-paper-plane"></i> Send Inquiry
      </button>
    </form>
  </div>
</div>

<div id="toast" class="toast"></div>

<footer style="background:#fff;padding:20px 24px;text-align:center;color:#64748b;font-size:.85rem;margin-top:40px;border-top:1px solid #e2e8f0">
  &copy; <script>document.write(new Date().getFullYear())</script> Globex International Trade Co., Ltd. All rights reserved.
</footer>

<script src="../../assets/js/config.js"></script>
<script src="../../assets/js/api-service.js"></script>
<script src="../../assets/js/supplier.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    loadSupplierDirectory('suppliers-grid');
  });
  // Close modal on overlay click
  document.getElementById('contactModal').addEventListener('click', function (e) {
    if (e.target === this) closeContactModal();
  });
</script>
</body>
</html>
